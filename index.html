<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MindOS — Twoja przestrzeń myśli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== CSS VARIABLES ========== */
:root {
  --bg: #0a0a0f;
  --bg2: #111118;
  --bg3: #1a1a24;
  --surface: #1e1e2e;
  --surface2: #252535;
  --border: #2e2e45;
  --accent: #7c6af7;
  --accent2: #e06af7;
  --accent3: #6af7c8;
  --text: #e8e8f0;
  --text2: #9090b0;
  --text3: #5050708;
  --win-bg: rgba(16,16,26,0.96);
  --win-border: rgba(124,106,247,0.3);
  --taskbar-h: 56px;
  --font-main: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --node-default: #7c6af7;
  --node-text: #ffffff;
  --anim-bg: particles;
}

/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  user-select: none;
}
button { font-family: var(--font-main); cursor: pointer; border: none; outline: none; }
input, textarea { font-family: var(--font-mono); outline: none; }

/* ========== BACKGROUND ========== */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ========== MIND MAP CANVAS ========== */
#mindmap-wrapper {
  position: fixed;
  inset: 0;
  bottom: var(--taskbar-h);
  z-index: 1;
  overflow: hidden;
  cursor: grab;
}
#mindmap-wrapper.grabbing { cursor: grabbing; }

#mindmap-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
}
#mindmap-svg .edge {
  stroke: var(--border);
  stroke-width: 2;
  pointer-events: stroke;
  cursor: pointer;
  transition: stroke 0.2s;
}
#mindmap-svg .edge:hover { stroke: var(--accent2); stroke-width: 3; }
#mindmap-svg .edge.selected { stroke: var(--accent2); stroke-width: 3; }

#mindmap-container {
  position: absolute;
  width: 0; height: 0;
  transform-origin: 0 0;
  z-index: 3;
}

.node {
  position: absolute;
  min-width: 100px;
  max-width: 220px;
  padding: 10px 16px;
  border-radius: 12px;
  font-family: var(--font-main);
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  cursor: move;
  border: 2px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), 0 0 0 0 transparent;
  transition: box-shadow 0.2s, border-color 0.2s;
  word-break: break-word;
  text-align: center;
  transform: translate(-50%, -50%);
  z-index: 4;
}
.node:hover {
  border-color: rgba(255,255,255,0.4);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 16px rgba(124,106,247,0.3);
}
.node.selected {
  border-color: var(--accent3) !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(106,247,200,0.4);
}
.node.connecting-source { border-color: var(--accent2) !important; cursor: crosshair; }

.node-actions {
  position: absolute;
  top: -36px; left: 50%;
  transform: translateX(-50%);
  display: none;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
  z-index: 10;
  white-space: nowrap;
}
.node:hover .node-actions,
.node.selected .node-actions { display: flex; }
.node-actions button {
  background: transparent;
  color: var(--text2);
  font-size: 12px;
  padding: 3px 7px;
  border-radius: 5px;
  transition: background 0.15s, color 0.15s;
}
.node-actions button:hover { background: var(--border); color: var(--text); }

/* ========== TOOLBAR ========== */
#toolbar {
  position: fixed;
  top: 16px; left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 6px;
  background: rgba(16,16,26,0.92);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 8px 12px;
  backdrop-filter: blur(20px);
  box-shadow: 0 4px 32px rgba(0,0,0,0.4);
}
.tb-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 13px;
  border-radius: 9px;
  background: transparent;
  color: var(--text2);
  font-size: 13px;
  font-weight: 600;
  transition: background 0.15s, color 0.15s;
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
.tb-btn.active { background: var(--accent); color: #fff; }
.tb-btn svg { flex-shrink: 0; }
.tb-sep { width: 1px; background: var(--border); margin: 4px 2px; }

/* ========== ZOOM INDICATOR ========== */
#zoom-indicator {
  position: fixed;
  bottom: calc(var(--taskbar-h) + 16px);
  right: 16px;
  z-index: 50;
  background: rgba(16,16,26,0.85);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text2);
  backdrop-filter: blur(10px);
}

/* ========== TASKBAR ========== */
#taskbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--taskbar-h);
  z-index: 200;
  background: rgba(10,10,18,0.95);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 16px;
  gap: 6px;
  backdrop-filter: blur(20px);
}
.tb-app-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  width: 56px; height: 44px;
  border-radius: 10px;
  background: transparent;
  color: rgba(255,255,255,0.35);
  font-size: 9px;
  font-weight: 600;
  transition: background 0.15s, color 0.15s, transform 0.15s;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.tb-app-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); transform: translateY(-2px); }
.tb-app-btn.open { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
.tb-app-btn.open .tb-icon svg { opacity: 1; }
.tb-icon { display: flex; align-items: center; justify-content: center; }
.tb-icon svg { width: 18px; height: 18px; opacity: 0.45; transition: opacity 0.15s; }
.tb-app-btn:hover .tb-icon svg { opacity: 0.85; }
.tb-sep-v { width: 1px; height: 28px; background: rgba(255,255,255,0.08); margin: 0 4px; }
#taskbar-time {
  position: absolute; right: 16px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}

/* ========== WINDOWS ========== */
.win {
  position: fixed;
  z-index: 150;
  background: var(--win-bg);
  border: 1px solid var(--win-border);
  border-radius: 14px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  display: flex; flex-direction: column;
  min-width: 280px;
  overflow: hidden;
  backdrop-filter: blur(24px);
  transition: box-shadow 0.2s;
}
.win.active-win { box-shadow: 0 16px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(124,106,247,0.3); }
.win-titlebar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: rgba(30,30,50,0.8);
  border-bottom: 1px solid var(--border);
  cursor: move;
  flex-shrink: 0;
}
.win-title {
  font-size: 13px; font-weight: 700;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.win-controls { display: flex; gap: 6px; }
.win-btn {
  width: 13px; height: 13px;
  border-radius: 50%;
  border: none; cursor: pointer;
  transition: opacity 0.15s;
}
.win-btn:hover { opacity: 0.8; }
.win-close { background: #ff5f57; }
.win-min { background: #ffbd2e; }
.win-body { flex: 1; overflow: auto; padding: 14px; }
.win-resize {
  position: absolute; bottom: 0; right: 0;
  width: 16px; height: 16px;
  cursor: se-resize;
  display: flex; align-items: flex-end; justify-content: flex-end;
  padding: 3px;
}
.win-resize::after {
  content: '';
  display: block;
  width: 8px; height: 8px;
  border-right: 2px solid var(--text2);
  border-bottom: 2px solid var(--text2);
  border-radius: 1px;
}

/* ========== NOTEPAD ========== */
#win-notes { width: 380px; height: 320px; }
#notepad-area {
  width: 100%; height: 100%;
  background: transparent;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.6;
  resize: none;
  border: none;
}
#notepad-area::placeholder { color: var(--text2); }

/* ========== CHECKLIST ========== */
#win-check { width: 320px; height: 380px; }
.check-input-row {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.check-input {
  flex: 1; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
}
.check-add-btn {
  padding: 8px 14px;
  background: var(--accent); color: #fff;
  border-radius: 8px; font-size: 13px; font-weight: 700;
}
.check-add-btn:hover { background: var(--accent2); }
#check-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; max-height: 240px; }
.check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  background: var(--surface);
  border-radius: 8px; border: 1px solid var(--border);
}
.check-item input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
.check-item label {
  flex: 1; font-size: 13px; cursor: pointer;
  transition: opacity 0.2s, text-decoration 0.2s;
}
.check-item.done label { opacity: 0.45; text-decoration: line-through; }
.check-del { background: transparent; color: var(--text2); font-size: 14px; padding: 2px 6px; border-radius: 5px; }
.check-del:hover { background: rgba(255,80,80,0.2); color: #ff5f57; }
.check-progress { margin-top: 10px; }
.check-progress-bar {
  height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px;
}
.check-progress-fill { height: 100%; background: var(--accent3); border-radius: 2px; transition: width 0.3s; }
.check-progress-text { font-size: 11px; color: var(--text2); font-family: var(--font-mono); }

/* ========== POMODORO ========== */
#win-pomo { width: 300px; height: 360px; }
.pomo-body { text-align: center; padding: 8px; }
.pomo-mode-btns { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; }
.pomo-mode-btn {
  padding: 5px 12px; border-radius: 6px;
  font-size: 11px; font-weight: 700;
  background: var(--surface); color: var(--text2);
  border: 1px solid var(--border);
  transition: all 0.15s;
}
.pomo-mode-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pomo-clock {
  font-family: var(--font-mono);
  font-size: 56px;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin: 12px 0;
  letter-spacing: -2px;
}
.pomo-ring {
  width: 130px; height: 130px;
  margin: 0 auto 16px;
  position: relative;
}
.pomo-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.pomo-ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
.pomo-ring-fill { fill: none; stroke: var(--accent); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
.pomo-time-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 24px; font-weight: 700;
  color: var(--text);
}
.pomo-ctrl-btns { display: flex; gap: 8px; justify-content: center; }
.pomo-btn {
  padding: 9px 20px;
  border-radius: 8px;
  font-size: 13px; font-weight: 700;
  transition: all 0.15s;
}
.pomo-start { background: var(--accent); color: #fff; }
.pomo-start:hover { background: var(--accent2); }
.pomo-reset { background: var(--surface); color: var(--text2); border: 1px solid var(--border); }
.pomo-reset:hover { background: var(--surface2); color: var(--text); }
.pomo-sessions { font-size: 11px; color: var(--text2); margin-top: 12px; font-family: var(--font-mono); }

/* ========== MUSIC PLAYER ========== */
#win-music { width: 340px; height: 420px; }
.music-body { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.turntable-wrap {
  width: 160px; height: 160px;
  position: relative;
  flex-shrink: 0;
}
.turntable-base {
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3a2a1a, #1a0f0a);
  border: 3px solid #3a2a1a;
  box-shadow: 0 4px 24px rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: visible;
}
.vinyl {
  width: 140px; height: 140px;
  border-radius: 50%;
  background:
    repeating-conic-gradient(rgba(255,255,255,0.03) 0deg 1deg, transparent 1deg 4deg),
    radial-gradient(circle at center, #333 0 18px, #111 18px 40%, #222 40% 45%, #111 45%);
  position: absolute;
  animation: spin 2.4s linear infinite paused;
}
.vinyl.playing { animation-play-state: running; }
.vinyl-label {
  position: absolute;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--accent) 0%, var(--accent2) 100%);
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.tonearm {
  position: absolute;
  top: 8px; right: -8px;
  width: 50px; height: 90px;
  transform-origin: top right;
  transform: rotate(18deg);
  transition: transform 0.8s ease;
}
.tonearm.playing { transform: rotate(0deg); }
.tonearm-shaft {
  position: absolute;
  top: 0; right: 0;
  width: 5px; height: 80px;
  background: linear-gradient(to bottom, #888, #555);
  border-radius: 3px;
  transform-origin: top center;
  transform: rotate(12deg);
}
.tonearm-head {
  position: absolute;
  bottom: 0; right: 0px;
  width: 12px; height: 12px;
  background: var(--accent);
  border-radius: 50% 50% 0 0;
  transform: rotate(12deg);
}
.tonearm-pivot {
  position: absolute;
  top: -4px; right: -4px;
  width: 12px; height: 12px;
  background: #888;
  border-radius: 50%;
  border: 2px solid #aaa;
}
@keyframes spin { to { transform: rotate(360deg); } }

.music-url-row {
  display: flex; gap: 8px; width: 100%;
}
.music-url-input {
  flex: 1; padding: 8px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px;
}
.music-url-input::placeholder { color: var(--text2); }
.music-load-btn {
  padding: 8px 12px;
  background: var(--accent); color: #fff;
  border-radius: 8px; font-size: 12px; font-weight: 700;
  white-space: nowrap;
}
.music-load-btn:hover { background: var(--accent2); }
.music-ctrl-row {
  display: flex; align-items: center; gap: 12px;
}
.music-play-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.15s;
}
.music-play-btn:hover { background: var(--accent2); transform: scale(1.05); }
.music-vol-row {
  display: flex; align-items: center; gap: 8px; width: 100%;
}
.music-vol-label { font-size: 11px; color: var(--text2); white-space: nowrap; }
.music-vol-slider {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: var(--border); border-radius: 2px; outline: none; cursor: pointer;
}
.music-vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  border-radius: 50%; background: var(--accent); cursor: pointer;
}
#music-audio { display: none; }
.music-status { font-size: 11px; color: var(--text2); font-family: var(--font-mono); text-align: center; }
.music-presets { width: 100%; }
.music-presets-label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.music-preset-btns { display: flex; flex-wrap: wrap; gap: 5px; }
.music-preset {
  padding: 4px 10px;
  background: var(--surface); color: var(--text2);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 11px; font-weight: 600;
  transition: all 0.15s;
}
.music-preset:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ========== NODE EDITOR MODAL ========== */
#node-editor {
  position: fixed;
  z-index: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 8px 48px rgba(0,0,0,0.6);
  display: none;
  min-width: 260px;
  backdrop-filter: blur(20px);
}
#node-editor h3 { font-size: 13px; color: var(--text2); margin-bottom: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
#node-text-input {
  width: 100%; padding: 8px 12px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-size: 14px; font-family: var(--font-main);
  margin-bottom: 10px; resize: vertical; min-height: 60px;
}
.color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.color-row label { font-size: 12px; color: var(--text2); flex-basis: 100%; }
.color-swatch {
  width: 26px; height: 26px; border-radius: 6px;
  border: 2px solid transparent; cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
}
.color-swatch:hover { transform: scale(1.1); }
.color-swatch.selected { border-color: #fff; }
#color-custom { width: 26px; height: 26px; border-radius: 6px; border: none; cursor: pointer; padding: 0; background: none; }
.editor-btns { display: flex; gap: 8px; }
.editor-save-btn {
  flex: 1; padding: 8px;
  background: var(--accent); color: #fff;
  border-radius: 8px; font-size: 13px; font-weight: 700;
}
.editor-save-btn:hover { background: var(--accent2); }
.editor-cancel-btn {
  padding: 8px 14px;
  background: var(--surface2); color: var(--text2);
  border-radius: 8px; font-size: 13px; border: 1px solid var(--border);
}
.editor-cancel-btn:hover { color: var(--text); }

/* ========== SETTINGS PANEL ========== */
#settings-panel {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 600;
  background: var(--win-bg);
  border: 1px solid var(--win-border);
  border-radius: 18px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.7);
  display: none;
  width: 480px;
  max-height: 80vh;
  overflow: auto;
  backdrop-filter: blur(24px);
}
.settings-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: var(--win-bg);
  z-index: 1;
}
.settings-header h2 { font-size: 16px; font-weight: 800; }
.settings-close {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--surface2); color: var(--text2);
  font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.settings-close:hover { background: rgba(255,80,80,0.2); color: #ff5f57; }
.settings-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
.settings-section h3 {
  font-size: 11px; font-weight: 700; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 12px;
}
.settings-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.settings-row label { font-size: 13px; color: var(--text); }
.settings-select {
  padding: 6px 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: var(--font-main);
  cursor: pointer;
}
.settings-color-input {
  width: 36px; height: 28px;
  border: 1px solid var(--border); border-radius: 6px;
  padding: 2px; cursor: pointer; background: none;
}
.color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.color-preset-btn {
  width: 28px; height: 28px; border-radius: 7px;
  border: 2px solid transparent;
  cursor: pointer; transition: all 0.15s;
}
.color-preset-btn:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.5); }
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.theme-btn {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  padding: 8px 6px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; cursor: pointer;
  transition: border-color 0.15s, background 0.15s, transform 0.15s;
}
.theme-btn:hover { background: var(--surface2); transform: translateY(-2px); border-color: rgba(255,255,255,0.2); }
.theme-btn.active { border-color: var(--accent); }
.theme-preview {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: block;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.theme-label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }

/* ========== CONTEXT MENU ========== */
#context-menu {
  position: fixed; z-index: 700;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  display: none; min-width: 160px;
}
.ctx-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 13px; color: var(--text2);
  cursor: pointer; transition: background 0.1s, color 0.1s;
}
.ctx-item:hover { background: var(--surface2); color: var(--text); }
.ctx-item.danger:hover { background: rgba(255,80,80,0.15); color: #ff5f57; }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 0; }

/* ========== OVERLAY ========== */
#settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 590; display: none;
  backdrop-filter: blur(4px);
}

/* ========== SCROLLBARS ========== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text2); }

/* ========== TOAST ========== */
#toast {
  position: fixed; bottom: calc(var(--taskbar-h) + 16px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 18px;
  font-size: 13px; color: var(--text2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  z-index: 800; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

let bgSpeed = 1;
let bgParticles = [];
let bgAnimFrame;
let bgT = 0;

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

function initParticles() {
  bgParticles = [];
  const n = Math.floor((bgCanvas.width * bgCanvas.height) / 14000);
  for (let i = 0; i < n; i++) {
    bgParticles.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      vx: (Math.random()-0.5)*0.3,
      vy: (Math.random()-0.5)*0.3,
      r: Math.random()*1.5+0.5,
      a: Math.random()*0.5+0.1
    });
  }
}
initParticles();

function drawBg() {
  bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
  const accentHex = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#7c6af7';
  const rgb = hexToRgb(accentHex) || {r:124,g:106,b:247};

  if (bgAnim === 'particles') {
    bgParticles.forEach((p,i) => {
      p.x += p.vx * bgSpeed;
      p.y += p.vy * bgSpeed;
      if (p.x < 0) p.x = bgCanvas.width;
      if (p.x > bgCanvas.width) p.x = 0;
      if (p.y < 0) p.y = bgCanvas.height;
      if (p.y > bgCanvas.height) p.y = 0;
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${p.a})`;
      bgCtx.fill();
      // connect nearby
      for (let j = i+1; j < bgParticles.length; j++) {
        const q = bgParticles[j];
        const dx = p.x-q.x, dy = p.y-q.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 80) {
          bgCtx.beginPath();
          bgCtx.moveTo(p.x,p.y);
          bgCtx.lineTo(q.x,q.y);
          bgCtx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${(1-dist/80)*0.08})`;
          bgCtx.lineWidth = 0.5;
          bgCtx.stroke();
        }
      }
    });
  } else if (bgAnim === 'grid') {
    bgT += 0.005 * bgSpeed;
    const offset = (bgT * 30) % 40;
    bgCtx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.06)`;
    bgCtx.lineWidth = 1;
    for (let x = -offset; x < bgCanvas.width; x += 40) {
      bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,bgCanvas.height); bgCtx.stroke();
    }
    for (let y = -offset; y < bgCanvas.height; y += 40) {
      bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(bgCanvas.width,y); bgCtx.stroke();
    }
  } else if (bgAnim === 'waves') {
    bgT += 0.02 * bgSpeed;
    for (let w = 0; w < 3; w++) {
      bgCtx.beginPath();
      for (let x = 0; x <= bgCanvas.width; x += 4) {
        const y = bgCanvas.height/2 + Math.sin(x*0.008 + bgT + w*1.5) * (50+w*30);
        if (x === 0) bgCtx.moveTo(x, y); else bgCtx.lineTo(x, y);
      }
      bgCtx.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${0.06-w*0.01})`;
      bgCtx.lineWidth = 1.5;
      bgCtx.stroke();
    }
  } else if (bgAnim === 'stars') {
    bgT += 0.001 * bgSpeed;
    bgParticles.forEach(p => {
      const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(bgT * 5 + p.x));
      bgCtx.beginPath();
      bgCtx.arc(p.x, p.y, p.r * twinkle, 0, Math.PI*2);
      bgCtx.fillStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},${p.a * twinkle})`;
      bgCtx.fill();
    });
  }

  bgAnimFrame = requestAnimationFrame(drawBg);
}
drawBg();

function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex.trim());
  return r ? {r:parseInt(r[1],16),g:parseInt(r[2],16),b:parseInt(r[3],16)} : null;
}

// ==================== MIND MAP CORE ====================
const wrapper = document.getElementById('mindmap-wrapper');
const container = document.getElementById('mindmap-container');
const svgEl = document.getElementById('mindmap-svg');
const edgesGroup = document.getElementById('edges-group');

function applyTransform() {
  container.style.transform = `translate(${viewX}px,${viewY}px) scale(${viewScale})`;
  document.getElementById('zoom-indicator').textContent = Math.round(viewScale*100)+'%';
  renderEdges();
}

function worldToScreen(wx, wy) {
  return { x: wx * viewScale + viewX, y: wy * viewScale + viewY };
}
function screenToWorld(sx, sy) {
  return { x: (sx - viewX) / viewScale, y: (sy - viewY) / viewScale };
}

// ---- NODES ----
function createNode(wx, wy, text='Węzeł', color='#7c6af7') {
  const id = 'n' + nodeIdCounter++;
  nodes[id] = { id, x: wx, y: wy, text, color };
  renderNode(id);
  renderEdges();
  return id;
}

function renderNode(id) {
  const n = nodes[id];
  if (!n) return;
  let el = document.getElementById('node-'+id);
  if (!el) {
    el = document.createElement('div');
    el.className = 'node';
    el.id = 'node-'+id;
    el.innerHTML = `
      <div class="node-actions">
        <button onclick="openNodeEditor('${id}')">✎</button>
        <button onclick="startConnect('${id}')">⊕</button>
        <button onclick="deleteNode('${id}')">✕</button>
      </div>
      <span class="node-label"></span>
    `;
    container.appendChild(el);

    el.addEventListener('mousedown', (e) => onNodeMouseDown(e, id));
    el.addEventListener('click', (e) => { e.stopPropagation(); selectNode(id); });
    el.addEventListener('dblclick', (e) => { e.stopPropagation(); openNodeEditor(id); });
    el.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); showCtxMenu(e, id); });
  }
  el.style.left = n.x + 'px';
  el.style.top = n.y + 'px';
  el.style.background = n.color;
  el.querySelector('.node-label').textContent = n.text;
}

function deleteNode(id) {
  const el = document.getElementById('node-'+id);
  if (el) el.remove();
  delete nodes[id];
  edges = edges.filter(e => e.s !== id && e.t !== id);
  if (selectedNodeId === id) selectedNodeId = null;
  renderEdges();
}

function selectNode(id) {
  if (connectMode && connectSourceId && connectSourceId !== id) {
    addEdge(connectSourceId, id);
    connectMode = false;
    connectSourceId = null;
    document.getElementById('btn-connect').classList.remove('active');
    document.querySelectorAll('.node').forEach(n => n.classList.remove('connecting-source'));
    showToast('Połączono węzły');
    return;
  }
  if (connectMode && !connectSourceId) {
    connectSourceId = id;
    document.getElementById('node-'+id).classList.add('connecting-source');
    showToast('Kliknij drugi węzeł, aby połączyć');
    return;
  }
  document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
  if (selectedNodeId === id) { selectedNodeId = null; return; }
  selectedNodeId = id;
  document.getElementById('node-'+id)?.classList.add('selected');
}

function onNodeMouseDown(e, id) {
  if (e.button !== 0) return;
  e.stopPropagation();
  if (connectMode) { selectNode(id); return; }
  draggingNodeId = id;
  const n = nodes[id];
  const sp = worldToScreen(n.x, n.y);
  nodeDragOffsetX = e.clientX - sp.x;
  nodeDragOffsetY = e.clientY - sp.y;
  bringToFront(id);
}

function bringToFront(id) {
  const el = document.getElementById('node-'+id);
  if (el) { container.appendChild(el); }
}

// ---- EDGES ----
function addEdge(s, t) {
  if (edges.find(e => (e.s===s&&e.t===t)||(e.s===t&&e.t===s))) return;
  edges.push({id:'e'+(edgeIdCounter++), s, t});
  renderEdges();
}

function renderEdges() {
  edgesGroup.innerHTML = '';
  edges.forEach(e => {
    const ns = nodes[e.s], nt = nodes[e.t];
    if (!ns || !nt) return;
    const ss = worldToScreen(ns.x, ns.y);
    const st = worldToScreen(nt.x, nt.y);
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    let d;
    if (edgeStyle === 'curved') {
      const mx = (ss.x+st.x)/2, my = (ss.y+st.y)/2;
      const dx = st.x-ss.x, dy = st.y-ss.y;
      d = `M ${ss.x} ${ss.y} Q ${mx-dy*0.3} ${my+dx*0.3} ${st.x} ${st.y}`;
    } else {
      d = `M ${ss.x} ${ss.y} L ${st.x} ${st.y}`;
    }
    path.setAttribute('d', d);
    path.setAttribute('class', 'edge' + (selectedEdgeId===e.id?' selected':''));
    if (showArrows) path.setAttribute('marker-end','url(#arrowhead)');
    path.setAttribute('data-eid', e.id);
    path.addEventListener('click', () => selectEdge(e.id));
    path.addEventListener('dblclick', () => deleteEdge(e.id));
    edgesGroup.appendChild(path);
  });
}

function selectEdge(id) {
  selectedEdgeId = (selectedEdgeId === id) ? null : id;
  renderEdges();
}

function deleteEdge(id) {
  edges = edges.filter(e => e.id !== id);
  selectedEdgeId = null;
  renderEdges();
  showToast('Połączenie usunięte');
}

// ---- CANVAS INTERACTION ----
wrapper.addEventListener('mousedown', (e) => {
  if (e.button === 1 || (e.button === 0 && !draggingNodeId)) {
    if (e.target === wrapper || e.target === svgEl || e.target === container) {
      isDraggingCanvas = true;
      wrapper.classList.add('grabbing');
      canvasDragStartX = e.clientX;
      canvasDragStartY = e.clientY;
      canvasDragOriginX = viewX;
      canvasDragOriginY = viewY;
    }
  }
});

document.addEventListener('mousemove', (e) => {
  if (draggingNodeId) {
    const n = nodes[draggingNodeId];
    if (!n) return;
    const wx = (e.clientX - nodeDragOffsetX - viewX) / viewScale;
    const wy = (e.clientY - nodeDragOffsetY - viewY) / viewScale;
    n.x = wx; n.y = wy;
    const el = document.getElementById('node-'+draggingNodeId);
    if (el) { el.style.left = wx+'px'; el.style.top = wy+'px'; }
    renderEdges();
  } else if (isDraggingCanvas) {
    viewX = canvasDragOriginX + (e.clientX - canvasDragStartX);
    viewY = canvasDragOriginY + (e.clientY - canvasDragStartY);
    applyTransform();
  }
});

document.addEventListener('mouseup', () => {
  draggingNodeId = null;
  isDraggingCanvas = false;
  wrapper.classList.remove('grabbing');
});

wrapper.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const wx = (mx - viewX) / viewScale;
  const wy = (my - viewY) / viewScale;
  viewScale = Math.max(0.1, Math.min(4, viewScale * factor));
  viewX = mx - wx * viewScale;
  viewY = my - wy * viewScale;
  applyTransform();
}, {passive: false});

wrapper.addEventListener('dblclick', (e) => {
  if (e.target === wrapper || e.target === svgEl || e.target === container || e.target.tagName === 'g') {
    const wp = screenToWorld(e.clientX, e.clientY);
    createNode(wp.x, wp.y, 'Nowy węzeł', selectedNodeColor);
  }
});

wrapper.addEventListener('contextmenu', (e) => {
  if (e.target === wrapper || e.target === svgEl || e.target === container) {
    e.preventDefault();
    ctxTargetNodeId = null;
    ctxPos = screenToWorld(e.clientX, e.clientY);
    showCtxMenu(e, null);
  }
});

document.addEventListener('click', () => hideCtxMenu());

// ---- TOOLBAR BUTTONS ----
document.getElementById('btn-add-node').addEventListener('click', () => {
  const wp = screenToWorld(wrapper.clientWidth/2, wrapper.clientHeight/2);
  createNode(wp.x + (Math.random()-0.5)*100, wp.y + (Math.random()-0.5)*100);
  showToast('Dodano węzeł');
});

document.getElementById('btn-connect').addEventListener('click', () => {
  connectMode = !connectMode;
  document.getElementById('btn-connect').classList.toggle('active', connectMode);
  connectSourceId = null;
  document.querySelectorAll('.node').forEach(n => n.classList.remove('connecting-source'));
  showToast(connectMode ? 'Kliknij pierwszy węzeł…' : 'Tryb łączenia wyłączony');
});

document.getElementById('btn-delete-selected').addEventListener('click', () => {
  if (selectedNodeId) { deleteNode(selectedNodeId); showToast('Węzeł usunięty'); }
  else if (selectedEdgeId) { deleteEdge(selectedEdgeId); }
  else showToast('Zaznacz węzeł lub połączenie');
});

document.getElementById('btn-fit').addEventListener('click', fitView);
document.getElementById('btn-center').addEventListener('click', () => {
  viewX = wrapper.clientWidth/2; viewY = wrapper.clientHeight/2;
  viewScale = 1; applyTransform();
});
document.getElementById('btn-clear-all').addEventListener('click', () => {
  if (!confirm('Wyczyścić całą mapę?')) return;
  Object.keys(nodes).forEach(id => { const el=document.getElementById('node-'+id); if(el)el.remove(); });
  nodes = {}; edges = []; selectedNodeId = null; selectedEdgeId = null;
  renderEdges(); showToast('Mapa wyczyszczona');
});

function fitView() {
  const ids = Object.keys(nodes);
  if (!ids.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  ids.forEach(id => {
    const n = nodes[id];
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x); maxY=Math.max(maxY,n.y);
  });
  const pad = 80;
  const w = wrapper.clientWidth, h = wrapper.clientHeight;
  const mw = maxX-minX+pad*2 || 1, mh = maxY-minY+pad*2 || 1;
  viewScale = Math.min(w/mw, h/mh, 2);
  viewX = w/2 - ((minX+maxX)/2)*viewScale;
  viewY = h/2 - ((minY+maxY)/2)*viewScale;
  applyTransform();
}

// ---- KEYBOARD SHORTCUTS ----
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'n' || e.key === 'N') document.getElementById('btn-add-node').click();
  if (e.key === 'c' || e.key === 'C') document.getElementById('btn-connect').click();
  if (e.key === 'Delete' || e.key === 'Backspace') document.getElementById('btn-delete-selected').click();
  if (e.key === 'f' || e.key === 'F') fitView();
  if (e.key === 'Escape') {
    connectMode = false;
    connectSourceId = null;
    document.getElementById('btn-connect').classList.remove('active');
    document.querySelectorAll('.node').forEach(n => n.classList.remove('connecting-source'));
    closeNodeEditor();
    hideCtxMenu();
  }
  if (e.key === 'Home') document.getElementById('btn-center').click();
});

// ---- NODE EDITOR ----
function openNodeEditor(id) {
  editingNodeId = id;
  const n = nodes[id];
  document.getElementById('node-text-input').value = n.text;
  selectedNodeColor = n.color;
  document.getElementById('color-custom').value = n.color;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('selected', s.dataset.color === n.color);
  });
  const el = document.getElementById('node-'+id);
  const rect = el.getBoundingClientRect();
  const editor = document.getElementById('node-editor');
  editor.style.display = 'block';
  let left = rect.left + rect.width/2 - 130;
  let top = rect.top - 220;
  if (top < 10) top = rect.bottom + 10;
  if (left < 10) left = 10;
  if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
  editor.style.left = left+'px';
  editor.style.top = top+'px';
  document.getElementById('node-text-input').focus();
}

function closeNodeEditor() {
  document.getElementById('node-editor').style.display = 'none';
  editingNodeId = null;
}

function saveNodeEdit() {
  if (!editingNodeId) return;
  nodes[editingNodeId].text = document.getElementById('node-text-input').value || 'Węzeł';
  nodes[editingNodeId].color = selectedNodeColor;
  renderNode(editingNodeId);
  closeNodeEditor();
}

document.getElementById('node-text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveNodeEdit(); }
});

function selectNodeColor(el) {
  selectedNodeColor = el.dataset.color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('color-custom').value = selectedNodeColor;
}
function customColor(val) {
  selectedNodeColor = val;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
}

// ---- CONTEXT MENU ----
function showCtxMenu(e, nodeId) {
  ctxTargetNodeId = nodeId;
  const menu = document.getElementById('context-menu');
  document.getElementById('ctx-edit').style.display = nodeId ? 'flex' : 'none';
  document.getElementById('ctx-connect').style.display = nodeId ? 'flex' : 'none';
  document.getElementById('ctx-sep1').style.display = nodeId ? 'block' : 'none';
  document.getElementById('ctx-del').style.display = nodeId ? 'flex' : 'none';
  document.getElementById('ctx-add').style.display = nodeId ? 'none' : 'flex';
  menu.style.display = 'block';
  let x = e.clientX, y = e.clientY;
  if (x + 180 > window.innerWidth) x = window.innerWidth - 185;
  if (y + 140 > window.innerHeight) y = y - 140;
  menu.style.left = x+'px'; menu.style.top = y+'px';
  e.stopPropagation();
}
function hideCtxMenu() { document.getElementById('context-menu').style.display = 'none'; }
function ctxAddNode() { createNode(ctxPos.x, ctxPos.y, 'Nowy węzeł', selectedNodeColor); hideCtxMenu(); }
function ctxEditNode() { if(ctxTargetNodeId) openNodeEditor(ctxTargetNodeId); hideCtxMenu(); }
function ctxConnectNode() { if(ctxTargetNodeId) { connectMode=true; connectSourceId=ctxTargetNodeId; document.getElementById('node-'+ctxTargetNodeId).classList.add('connecting-source'); showToast('Kliknij drugi węzeł'); } hideCtxMenu(); }
function ctxDelNode() { if(ctxTargetNodeId) deleteNode(ctxTargetNodeId); hideCtxMenu(); }

function startConnect(id) {
  connectMode = true;
  connectSourceId = id;
  document.getElementById('btn-connect').classList.add('active');
  document.getElementById('node-'+id)?.classList.add('connecting-source');
  showToast('Kliknij węzeł docelowy');
}

// ---- SAVE AS IMAGE ----
document.getElementById('btn-save-img').addEventListener('click', async () => {
  const ids = Object.keys(nodes);
  if (!ids.length) { showToast('Brak węzłów do zapisania'); return; }
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  ids.forEach(id => {
    const n = nodes[id];
    const el = document.getElementById('node-'+id);
    const w = el ? el.offsetWidth : 120;
    const h = el ? el.offsetHeight : 40;
    minX=Math.min(minX,n.x-w/2); minY=Math.min(minY,n.y-h/2);
    maxX=Math.max(maxX,n.x+w/2); maxY=Math.max(maxY,n.y+h/2);
  });
  const pad = 60;
  const W = maxX-minX+pad*2, H = maxY-minY+pad*2;
  const c = document.createElement('canvas');
  c.width = Math.max(W,400); c.height = Math.max(H,300);
  const ctx = c.getContext('2d');

  // Load and embed font
  try {
    const font = new FontFace('Syne', 'url(https://fonts.gstatic.com/s/syne/v22/8vIS7w4qzmVxsWxjBZRjr0FKM_04uQ.woff2)', {weight:'700'});
    const loaded = await font.load();
    document.fonts.add(loaded);
    await document.fonts.ready;
  } catch(e) { /* fallback to system font */ }

  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0a0a0f';
  ctx.fillRect(0,0,c.width,c.height);

  edges.forEach(e => {
    const ns=nodes[e.s],nt=nodes[e.t];
    if (!ns||!nt) return;
    const sx = ns.x-minX+pad, sy = ns.y-minY+pad;
    const tx = nt.x-minX+pad, ty = nt.y-minY+pad;
    ctx.beginPath();
    ctx.strokeStyle = '#2e2e45';
    ctx.lineWidth = 2;
    ctx.moveTo(sx,sy);
    ctx.lineTo(tx,ty);
    ctx.stroke();
  });

  ids.forEach(id => {
    const n = nodes[id];
    const el = document.getElementById('node-'+id);
    const w = el ? el.offsetWidth : 120;
    const h = el ? el.offsetHeight : 40;
    const x = n.x-minX+pad-w/2, y = n.y-minY+pad-h/2;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x,y,w,h,12);
    else { ctx.rect(x,y,w,h); }
    ctx.fillStyle = n.color;
    ctx.fill();
    ctx.font = 'bold 14px Syne, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.text, x+w/2, y+h/2);
  });

  const a = document.createElement('a');
  a.download = 'mapa-mysli.png';
  a.href = c.toDataURL();
  a.click();
  showToast('Obraz zapisany');
});

// ---- EXPORT / IMPORT JSON ----
document.getElementById('btn-export-json').addEventListener('click', () => {
  const data = JSON.stringify({nodes, edges, viewX, viewY, viewScale}, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.download = 'mapa-mysli.json';
  a.href = URL.createObjectURL(blob);
  a.click();
  showToast('Wyeksportowano JSON');
});

document.getElementById('btn-import-json').addEventListener('click', () => {
  document.getElementById('json-file-input').click();
});

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const data = JSON.parse(ev.target.result);
      Object.keys(nodes).forEach(id => { const el=document.getElementById('node-'+id); if(el)el.remove(); });
      nodes = data.nodes || {};
      edges = data.edges || [];
      viewX = data.viewX || 0;
      viewY = data.viewY || 0;
      viewScale = data.viewScale || 1;
      let maxId = 1;
      Object.keys(nodes).forEach(id => {
        const num = parseInt(id.replace('n',''));
        if (num >= maxId) maxId = num+1;
      });
      nodeIdCounter = maxId;
      Object.keys(nodes).forEach(id => renderNode(id));
      applyTransform();
      showToast('Wczytano mapę z JSON');
    } catch { showToast('Błąd wczytywania pliku'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function getWinPositions() {
  try { return JSON.parse(localStorage.getItem('mindos-wins') || '{}'); } catch { return {}; }
}
function saveWinPositions() {
  const pos = {};
  ['win-notes','win-check','win-pomo','win-music'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.style.display !== 'none') {
      pos[id] = { top: el.style.top, left: el.style.left, width: el.style.width, height: el.style.height };
    }
  });
  localStorage.setItem('mindos-wins', JSON.stringify(pos));
}

function toggleWin(winId, btnId) {
  const el = document.getElementById(winId);
  const btn = document.getElementById(btnId);
  if (!el) return;
  if (el.style.display === 'none' || !el.style.display) {
    const saved = getWinPositions()[winId];
    if (saved) {
      if (saved.top) el.style.top = saved.top;
      if (saved.left) el.style.left = saved.left;
      if (saved.width) el.style.width = saved.width;
      if (saved.height) el.style.height = saved.height;
    }
    el.style.display = 'flex';
    btn?.classList.add('open');
    focusWin(el);
  } else {
    saveWinPositions();
    el.style.display = 'none';
    btn?.classList.remove('open');
  }
}

function closeWin(winId, btnId) {
  saveWinPositions();
  const el = document.getElementById(winId);
  if (el) el.style.display = 'none';
  document.getElementById(btnId)?.classList.remove('open');
}

function focusWin(el) {
  document.querySelectorAll('.win').forEach(w => w.classList.remove('active-win'));
  el.classList.add('active-win');
  let maxZ = 150;
  document.querySelectorAll('.win').forEach(w => { if (w !== el) { maxZ = Math.max(maxZ, parseInt(w.style.zIndex||150)); } });
  el.style.zIndex = maxZ + 1;
}

// Window dragging
document.querySelectorAll('.win-titlebar').forEach(bar => {
  let mx0, my0, lx0, ly0;
  bar.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('win-btn')) return;
    const win = bar.closest('.win');
    focusWin(win);
    mx0=e.clientX; my0=e.clientY;
    lx0=parseInt(win.style.left||0); ly0=parseInt(win.style.top||0);
    const move = (ev) => {
      win.style.left = Math.max(0, lx0+(ev.clientX-mx0))+'px';
      win.style.top = Math.max(0, Math.min(window.innerHeight-40, ly0+(ev.clientY-my0)))+'px';
    };
    const up = () => { document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); saveWinPositions(); };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
});

// Window resizing
document.querySelectorAll('.win-resize').forEach(handle => {
  let mx0, my0, w0, h0;
  handle.addEventListener('mousedown', (e) => {
    e.stopPropagation();
    const win = handle.closest('.win');
    mx0=e.clientX; my0=e.clientY;
    w0=win.offsetWidth; h0=win.offsetHeight;
    const move = (ev) => {
      win.style.width = Math.max(200, w0+(ev.clientX-mx0))+'px';
      win.style.height = Math.max(150, h0+(ev.clientY-my0))+'px';
    };
    const up = () => { document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); saveWinPositions(); };
    document.addEventListener('mousemove',move);
    document.addEventListener('mouseup',up);
  });
});

document.querySelectorAll('.win').forEach(win => {
  win.addEventListener('mousedown', () => focusWin(win));
});

noteArea.addEventListener('input', () => localStorage.setItem('mindos-notes', noteArea.value));

// ==================== CHECKLIST ====================
let checkItems = JSON.parse(localStorage.getItem('mindos-check') || '[]');

function renderChecklist() {
  const list = document.getElementById('check-list');
  list.innerHTML = '';
  checkItems.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'check-item' + (item.done ? ' done' : '');
    div.innerHTML = `
      <input type="checkbox" id="chk-${i}" ${item.done?'checked':''} onchange="toggleCheck(${i})">
      <label for="chk-${i}">${item.text}</label>
      <button class="check-del" onclick="deleteCheck(${i})">✕</button>
    `;
    list.appendChild(div);
  });
  const done = checkItems.filter(x=>x.done).length;
  const total = checkItems.length;
  document.getElementById('check-prog-text').textContent = `${done} / ${total} ukończonych`;
  document.getElementById('check-prog-fill').style.width = total ? (done/total*100)+'%' : '0%';
  localStorage.setItem('mindos-check', JSON.stringify(checkItems));
}

function addCheckItem() {
  const inp = document.getElementById('check-input');
  const text = inp.value.trim();
  if (!text) return;
  checkItems.push({text, done: false});
  inp.value = '';
  renderChecklist();
}
document.getElementById('check-input').addEventListener('keydown', e => { if(e.key==='Enter') addCheckItem(); });
function toggleCheck(i) { checkItems[i].done = !checkItems[i].done; renderChecklist(); }
function deleteCheck(i) { checkItems.splice(i,1); renderChecklist(); }
renderChecklist();

// ==================== POMODORO ====================
const POMO_TIMES = { work: 25*60, short: 5*60, long: 15*60 };
let pomoMode = 'work';
let pomoTotal = POMO_TIMES.work;
let pomoRemain = pomoTotal;
let pomoRunning = false;
let pomoInterval = null;
let pomoSessions = 0;

function setPomoMode(mode) {
  pomoMode = mode;
  document.querySelectorAll('.pomo-mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pomo-'+mode+'-btn').classList.add('active');
  resetPomo();
}

function togglePomo() {
  pomoRunning = !pomoRunning;
  document.getElementById('pomo-start-btn').textContent = pomoRunning ? '⏸ Pauza' : '▶ Start';
  if (pomoRunning) {
    pomoInterval = setInterval(() => {
      pomoRemain--;
      if (pomoRemain <= 0) {
        pomoRemain = 0;
        clearInterval(pomoInterval);
        pomoRunning = false;
        document.getElementById('pomo-start-btn').textContent = '▶ Start';
        if (pomoMode === 'work') { pomoSessions++; document.getElementById('pomo-sessions').textContent = 'Sesje: '+pomoSessions+' 🍅'; }
        showToast('⏰ Czas minął!');
      }
      updatePomoDisplay();
    }, 1000);
  } else {
    clearInterval(pomoInterval);
  }
}

function resetPomo() {
  clearInterval(pomoInterval);
  pomoRunning = false;
  document.getElementById('pomo-start-btn').textContent = '▶ Start';
  pomoTotal = POMO_TIMES[pomoMode];
  pomoRemain = pomoTotal;
  updatePomoDisplay();
}

function updatePomoDisplay() {
  const m = Math.floor(pomoRemain/60).toString().padStart(2,'0');
  const s = (pomoRemain%60).toString().padStart(2,'0');
  document.getElementById('pomo-display').textContent = m+':'+s;
  const circ = 2*Math.PI*44;
  const offset = circ * (1 - pomoRemain/pomoTotal);
  document.getElementById('pomo-circle').style.strokeDashoffset = offset;
}
updatePomoDisplay();

// ==================== MUSIC PLAYER ====================
const audio = document.getElementById('music-audio');
let musicPlaying = false;

function loadMusicUrl() {
  const url = document.getElementById('music-url').value.trim();
  if (!url) return;
  audio.src = url;
  audio.load();
  document.getElementById('music-status').textContent = 'Załadowano';
  showToast('URL załadowany');
}

function loadPreset(url, name) {
  document.getElementById('music-url').value = url;
  audio.src = url;
  audio.volume = parseFloat(document.querySelector('.music-vol-slider').value);
  audio.load();
  document.getElementById('music-status').textContent = name;
  audio.play().then(() => {
    musicPlaying = true;
    document.getElementById('music-play-btn').textContent = '⏸';
    document.getElementById('vinyl-disc').classList.add('playing');
    document.getElementById('tonearm').classList.add('playing');
  }).catch(() => {
    showToast('Nie udało się połączyć ze stacją');
  });
}

function toggleMusic() {
  if (!audio.src) { showToast('Najpierw załaduj URL'); return; }
  if (musicPlaying) {
    audio.pause();
    musicPlaying = false;
    document.getElementById('music-play-btn').textContent = '▶';
    document.getElementById('vinyl-disc').classList.remove('playing');
    document.getElementById('tonearm').classList.remove('playing');
  } else {
    audio.play().then(() => {
      musicPlaying = true;
      document.getElementById('music-play-btn').textContent = '⏸';
      document.getElementById('vinyl-disc').classList.add('playing');
      document.getElementById('tonearm').classList.add('playing');
    }).catch(() => showToast('Błąd odtwarzania'));
  }
}

function setVolume(v) {
  audio.volume = parseFloat(v);
}

audio.addEventListener('error', () => {
  musicPlaying = false;
  document.getElementById('music-play-btn').textContent = '▶';
  document.getElementById('vinyl-disc').classList.remove('playing');
  document.getElementById('tonearm').classList.remove('playing');
  document.getElementById('music-status').textContent = 'Błąd — sprawdź URL';
});

// ==================== SETTINGS ====================
function openSettings() {
  document.getElementById('settings-panel').style.display = 'block';
  document.getElementById('settings-overlay').style.display = 'block';
}
function closeSettings() {
  document.getElementById('settings-panel').style.display = 'none';
  document.getElementById('settings-overlay').style.display = 'none';
}
function setBgAnim(val) {
  bgAnim = val;
  if (val === 'particles' || val === 'stars') initParticles();
}
function setBgSpeed(val) {
  bgSpeed = val === 'slow' ? 0.4 : val === 'fast' ? 3 : 1;
}
function setAccent(val) {
  document.documentElement.style.setProperty('--accent', val);
}
function setBgColor(val, val2) {
  document.documentElement.style.setProperty('--bg', val);
  document.documentElement.style.setProperty('--bg2', val2 || val);
  document.body.style.background = val;
}
function applyTheme(accent, bg, bg2) {
  setAccent(accent);
  setBgColor(bg, bg2 || bg);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
  const accentKey = accent.replace('#','');
  const match = document.querySelector(`.theme-btn[onclick*="${accentKey}"]`);
  if (match) match.classList.add('active');
}
function setFont(val) {
  document.documentElement.style.setProperty('--font-main', val);
}

// ==================== TASKBAR CLOCK ====================
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('taskbar-time').textContent = h+':'+m;
}
updateClock();
setInterval(updateClock, 10000);

// ==================== TOAST ====================
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ==================== INIT SAMPLE MAP ====================
(function initSampleMap() {
  viewX = window.innerWidth / 2;
  viewY = (window.innerHeight - 56) / 2;
  viewScale = 1;

  const cx = 0, cy = 0;
  const root = createNode(cx, cy, '💡 Mapa Myśli', '#7c6af7');

  const topics = [
    {text:'🎯 Cel', color:'#e06af7', dx:-200, dy:-120},
    {text:'📚 Nauka', color:'#6ab4f7', dx:200, dy:-120},
    {text:'✨ Pomysły', color:'#6af7c8', dx:200, dy:120},
    {text:'🔧 Narzędzia', color:'#f7c86a', dx:-200, dy:120},
  ];
  const children = [
    {text:'Główny zamysł', color:'#b06af7', dx:-350, dy:-180, parent:0},
    {text:'Priorytet', color:'#c06af7', dx:-200, dy:-240, parent:0},
    {text:'Kursy', color:'#6a9ef7', dx:350, dy:-180, parent:1},
    {text:'Notatki', color:'#6aaef7', dx:200, dy:-250, parent:1},
    {text:'Projekt A', color:'#6af7a8', dx:350, dy:180, parent:2},
    {text:'Eksperyment', color:'#6af7e8', dx:180, dy:250, parent:2},
    {text:'MindOS', color:'#f7b06a', dx:-350, dy:180, parent:3},
    {text:'Skróty kl.', color:'#f7d06a', dx:-180, dy:250, parent:3},
  ];

  const tIds = topics.map(t => createNode(cx+t.dx, cy+t.dy, t.text, t.color));
  tIds.forEach(id => addEdge(root, id));

  children.forEach(c => {
    const id = createNode(cx+c.dx, cy+c.dy, c.text, c.color);
    addEdge(tIds[c.parent], id);
  });

  applyTransform();
})();
</script>
