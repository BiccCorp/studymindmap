<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyOS v2</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --primary: #6366f1; --secondary: #a855f7; --accent: #10b981;
      --bg-gradient: linear-gradient(135deg, #0b1120, #151b2b, #1e293b);
      --font-main: 'Inter', system-ui, sans-serif; --font-accent: 'JetBrains Mono', monospace;
      --glass: rgba(255,255,255,0.08); --glass-border: rgba(255,255,255,0.15);
      --text: #e2e8f0; --shadow: 0 10px 40px rgba(0,0,0,0.5);
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    body { font-family: var(--font-main); color: var(--text); background: var(--bg-gradient); min-height: 100vh; overflow: hidden; transition: background 0.8s ease; }
    #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

    /* DOCK & DRAWER */
    #dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(14px); padding: 10px 18px; border-radius: 20px; display: flex; gap: 10px; box-shadow: var(--shadow); z-index: 1000; }
    .dock-btn { width: 46px; height: 46px; border-radius: 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: var(--text); font-size: 18px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .dock-btn:hover, .dock-btn.active { background: var(--primary); transform: translateY(-5px); }
    .dock-btn.active { border-color: var(--secondary); }
    #tools-drawer { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(12px); padding: 8px; border-radius: 12px; display: flex; gap: 6px; opacity: 0; pointer-events: none; transition: all 0.2s; box-shadow: var(--shadow); }
    #tools-drawer.open { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
    .tool-toggle { background: rgba(255,255,255,0.15); border: none; color: var(--text); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; white-space: nowrap; }
    .tool-toggle:hover { background: var(--secondary); }

    /* MAIN VIEWS */
    #views { position: absolute; top: 0; left: 0; width: 100%; height: calc(100vh - 80px); padding: 24px; overflow-y: auto; }
    .view { display: none; max-width: 1100px; margin: 0 auto; }
    .view.active { display: block; animation: fadeSlide 0.3s ease; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* FLOATING WINDOWS */
    #windows-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .window { position: absolute; background: rgba(15,23,42,0.88); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); border-radius: var(--radius); box-shadow: var(--shadow); pointer-events: auto; min-width: 280px; overflow: hidden; display: flex; flex-direction: column; }
    .window-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(0,0,0,0.35); cursor: grab; border-bottom: 1px solid var(--glass-border); }
    .window-header:active { cursor: grabbing; }
    .window-title { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .win-close { width: 20px; height: 20px; border-radius: 50%; border: none; background: #ef4444; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: 0.15s; }
    .win-close:hover { transform: scale(1.1); background: #dc2626; }
    .window-body { padding: 12px; flex: 1; overflow-y: auto; max-height: 400px; }

    /* MINDMAP VIEWPORT & WORLD */
    #mm-viewport { position: relative; width: 100%; height: 65vh; background: rgba(0,0,0,0.15); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--glass-border); cursor: grab; }
    #mm-viewport.panning { cursor: grabbing; }
    #mm-world { position: absolute; top: 0; left: 0; transform-origin: 0 0; width: 0; height: 0; }
    #mm-svg { position: absolute; top: -4000px; left: -4000px; width: 8000px; height: 8000px; pointer-events: none; }
    #mm-svg line { stroke: var(--primary); stroke-width: 2; stroke-linecap: round; opacity: 0.8; }
    .mm-toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }

    /* NODES & HOVER MENU */
    .node { position: absolute; min-width: 100px; padding: 8px 10px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; cursor: move; font-size: 13px; text-align: center; transition: box-shadow 0.2s, transform 0.15s; }
    .node.selected { border-color: var(--secondary); box-shadow: 0 0 14px rgba(168,85,247,0.5); transform: scale(1.04); }
    .node.flashcard-blur { filter: blur(6px); cursor: pointer; }
    .node-menu { position: absolute; background: #1e293b; border: 1px solid var(--glass-border); border-radius: 10px; padding: 8px; box-shadow: var(--shadow); z-index: 500; display: none; pointer-events: auto; }
    .node-menu.visible { display: block; }
    .color-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 6px; }
    .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .color-dot:hover { transform: scale(1.2); border-color: white; }
    .menu-btn { width: 100%; padding: 5px; background: rgba(255,255,255,0.1); border: none; color: var(--text); border-radius: 6px; cursor: pointer; font-size: 11px; }
    .menu-btn:hover { background: #ef4444; }

    /* UI ELEMENTS */
    .input-row { display: flex; gap: 8px; margin: 8px 0; }
    .input-row input, .input-row textarea { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); color: var(--text); padding: 8px; border-radius: 8px; font-family: inherit; }
    .input-row textarea { height: 100px; resize: vertical; }
    .btn { background: var(--primary); color: white; border: none; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.15s; }
    .btn:hover { background: #5558e6; transform: translateY(-1px); }
    .btn.outline { background: transparent; border: 1px solid var(--glass-border); color: var(--text); }
    .btn.outline:hover { background: rgba(255,255,255,0.1); }
    .check-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .check-item.done span { text-decoration: line-through; opacity: 0.5; }
    .pomo-display { font-size: 28px; font-family: var(--font-accent); text-align: center; margin: 10px 0; letter-spacing: 2px; }
    .pomo-status { font-size: 12px; text-align: center; color: #94a3b8; margin-bottom: 8px; }
    .pomo-controls { display: flex; justify-content: center; gap: 8px; }
    .setting-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; font-size: 13px; }
    .color-picker { width: 30px; height: 30px; border: none; background: transparent; cursor: pointer; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <nav id="dock">
    <button class="dock-btn active" data-view="mindmap" title="Mapa Myśli">🧠</button>
    <button class="dock-btn" id="dock-tools" title="Narzędzia">🛠️</button>
    <button class="dock-btn" data-view="settings" title="Ustawienia">⚙️</button>
  </nav>
  <div id="tools-drawer">
    <button class="tool-toggle" data-win="pomo-win">⏱ Pomodoro</button>
    <button class="tool-toggle" data-win="radio-win">📻 Radio</button>
    <button class="tool-toggle" data-win="notes-win">📝 Notatnik</button>
    <button class="tool-toggle" data-win="check-win">✅ Checklist</button>
  </div>

  <main id="views">
    <section id="view-mindmap" class="view active">
      <div class="mm-toolbar">
        <button class="btn" id="mm-add">+ Nowy węzeł</button>
        <button class="btn outline" id="mm-flashcard">🃏 Tryb Fiszek</button>
        <button class="btn outline" id="mm-exp-json">💾 JSON</button>
        <button class="btn outline" id="mm-imp-json">📂 Import</button>
        <button class="btn outline" id="mm-exp-png">🖼️ PNG</button>
        <span style="margin-left:auto;font-size:12px;color:#94a3b8;">Scroll: zoom | Drag tła: pan | Przeciągnij węzeł na inny: połącz</span>
      </div>
      <div id="mm-viewport">
        <div id="mm-world">
          <svg id="mm-svg"></svg>
          <!-- Węzły będą dodawane dynamicznie -->
        </div>
      </div>
    </section>

    <section id="view-settings" class="view">
      <h2>⚙️ Personalizacja</h2>
      <div class="setting-row"><span>Kolor główny:</span> <input type="color" id="set-primary" class="color-picker" value="#6366f1"></div>
      <div class="setting-row"><span>Kolor poboczny:</span> <input type="color" id="set-secondary" class="color-picker" value="#a855f7"></div>
      <div class="setting-row"><span>Font główny:</span> <select id="set-font-main" style="padding:6px;border-radius:6px;background:rgba(0,0,0,0.3);color:white;border:1px solid var(--glass-border);"><option value="'Inter', sans-serif">Inter</option><option value="'Roboto', sans-serif">Roboto</option><option value="serif">Serif</option></select></div>
      <div class="setting-row"><span>Wizualizator:</span> <input type="range" id="set-vis-speed" min="0.2" max="2.5" step="0.1" value="0.8"></div>
      <button class="btn" id="set-reset" style="margin-top:16px;background:#ef4444;">🗑️ Resetuj wszystko</button>
    </section>
  </main>

  <div id="windows-container"></div>
  <div id="node-hover-menu" class="node-menu">
    <div class="color-grid" id="palette-grid"></div>
    <button class="menu-btn" id="del-links-btn">🗑️ Usuń wszystkie połączenia</button>
  </div>

  <script>
    // === 1. STATE & STORAGE ===
    const Store = { key: 'studyos_v2', saveDelay: 250, timer: null };
    Store.state = {
      windowsOpen: [],
      mm: { nodes: [{id:1, x:0, y:0, text:'Centrum', color:''}], links: [], zoom: 1, panX: 0, panY: 0 },
      notes: '', checklist: [],
      pomo: { work: 25, break: 5, time: 25*60, running: false, mode: 'work', lastTick: Date.now() },
      radioUrl: '', settings: { primary:'#6366f1', secondary:'#a855f7', fontMain:"'Inter', sans-serif", speed:0.8 }
    };
    Store.load = () => { try { const d = localStorage.getItem(Store.key); if(d) Object.assign(Store.state, JSON.parse(d)); } catch(e){} };
    Store.save = () => { clearTimeout(Store.timer); Store.timer = setTimeout(() => localStorage.setItem(Store.key, JSON.stringify(Store.state)), Store.saveDelay); };
    Store.load();

    // === 2. WINDOW MANAGER (Toggleable) ===
    const winContainer = document.getElementById('windows-container');
    let winZ = 100;
    const toolDefs = {
      'pomo-win': { title: '⏱ Pomodoro', x: 60, y: 50, w: 260 },
      'radio-win': { title: '📻 Radio', x: 340, y: 50, w: 260 },
      'notes-win': { title: '📝 Notatnik', x: 620, y: 50, w: 280 },
      'check-win': { title: '✅ Checklist', x: 60, y: 300, w: 260 }
    };

    function toggleWindow(id) {
      const el = document.getElementById(id);
      if(el) { el.remove(); Store.state.windowsOpen = Store.state.windowsOpen.filter(w=>w!==id); }
      else createWindow(id);
      Store.save();
    }
    function createWindow(id) {
      if(document.getElementById(id)) return;
      const def = toolDefs[id];
      const win = document.createElement('div');
      win.className = 'window'; win.id = id;
      win.style.cssText = `left:${def.x}px; top:${def.y}px; width:${def.w}px; z-index:${++winZ};`;
      win.innerHTML = `<div class="window-header"><span class="window-title">${def.title}</span><button class="win-close">✕</button></div><div class="window-body" id="${id}-body"></div>`;
      winContainer.appendChild(win);
      Store.state.windowsOpen.push(id);
      win.querySelector('.win-close').onclick = () => toggleWindow(id);
      win.onmousedown = () => win.style.zIndex = ++winZ;
      dragWindow(win);
      populateToolContent(id);
    }
    function dragWindow(win) {
      const hdr = win.querySelector('.window-header');
      let isDrag=false, ox, oy;
      hdr.onmousedown = e => { isDrag=true; ox=e.clientX-win.offsetLeft; oy=e.clientY-win.offsetTop; win.style.zIndex=++winZ; e.preventDefault(); };
      window.onmousemove = e => { if(!isDrag)return; win.style.left=(e.clientX-ox)+'px'; win.style.top=(e.clientY-oy)+'px'; };
      window.onmouseup = () => isDrag=false;
    }
    function populateToolContent(id) {
      const body = document.getElementById(`${id}-body`);
      if(id==='pomo-win') {
        body.innerHTML = `<div class="pomo-status" id="pomo-mode">Praca</div><div class="pomo-display" id="pomo-time">25:00</div><div class="pomo-controls"><button class="btn" id="pomo-start">▶ Start</button><button class="btn outline" id="pomo-reset">🔄</button></div><div class="input-row"><input type="number" id="pomo-work" value="${Store.state.pomo.work}" min="1"><span>praca</span><input type="number" id="pomo-break" value="${Store.state.pomo.break}" min="1"><span>przerwa</span></div>`;
        updatePomoUI();
        document.getElementById('pomo-start').onclick = togglePomo;
        document.getElementById('pomo-reset').onclick = resetPomo;
        ['pomo-work','pomo-break'].forEach(id2 => document.getElementById(id2).onchange = e => { Store.state.pomo[id2.replace('pomo-','')] = parseInt(e.target.value)||25; resetPomo(); });
      } else if(id==='radio-win') {
        body.innerHTML = `<input type="text" id="radio-url" placeholder="URL mp3/aac" value="${Store.state.radioUrl}" style="width:100%"><div style="margin-top:8px;display:flex;gap:8px;"><button class="btn" id="radio-play">▶ Graj</button><input type="range" id="radio-vol" min="0" max="1" step="0.1" value="0.5" style="flex:1"></div>`;
        const audio = new Audio(); audio.crossOrigin = 'anonymous';
        document.getElementById('radio-play').onclick = () => { audio.src = document.getElementById('radio-url').value; audio.paused ? audio.play().catch(()=>alert('❌ CORS/HTTPS error')) : audio.pause(); document.getElementById('radio-play').textContent = audio.paused ? '▶ Graj' : '⏸ Pauza'; Store.state.radioUrl = document.getElementById('radio-url').value; Store.save(); };
        document.getElementById('radio-vol').oninput = e => audio.volume = e.target.value;
      } else if(id==='notes-win') {
        body.innerHTML = `<textarea id="notes-txt" placeholder="Myśli, linki, definicje...">${Store.state.notes}</textarea>`;
        document.getElementById('notes-txt').oninput = e => { Store.state.notes = e.target.value; Store.save(); };
      } else if(id==='check-win') {
        body.innerHTML = `<div class="input-row"><input type="text" id="check-inp" placeholder="Zadanie"><button class="btn" id="check-add">+</button></div><div id="check-list"></div>`;
        renderChecks();
        document.getElementById('check-add').onclick = () => { const t=document.getElementById('check-inp').value.trim(); if(!t)return; Store.state.checklist.push({id:Date.now(),text:t,done:false}); document.getElementById('check-inp').value=''; Store.save(); renderChecks(); };
      }
    }
    function renderChecks() {
      const list = document.getElementById('check-list'); list.innerHTML='';
      Store.state.checklist.forEach(c => { list.innerHTML += `<div class="check-item ${c.done?'done':''}"><input type="checkbox" ${c.done?'checked':''} onchange="toggleCheck(${c.id})"><span>${c.text}</span><button class="btn outline" style="padding:2px 6px;margin-left:auto;" onclick="delCheck(${c.id})">✕</button></div>`; });
    }
    window.toggleCheck = id => { const c=Store.state.checklist.find(x=>x.id===id); if(c){c.done=!c.done; Store.save(); renderChecks();} };
    window.delCheck = id => { Store.state.checklist=Store.state.checklist.filter(x=>x.id!==id); Store.save(); renderChecks(); };

    // Drawer Toggle
    const drawer = document.getElementById('tools-drawer');
    document.getElementById('dock-tools').onclick = () => drawer.classList.toggle('open');
    document.querySelectorAll('.tool-toggle').forEach(btn => btn.onclick = () => toggleWindow(btn.dataset.win));
    // Restore open windows on load
    Store.state.windowsOpen.forEach(id => createWindow(id));

    // === 3. POMODORO LOGIC ===
    let pomoInterval;
    function updatePomoUI() {
      if(!document.getElementById('pomo-time')) return;
      const m = Math.floor(Store.state.pomo.time/60).toString().padStart(2,'0');
      const s = (Store.state.pomo.time%60).toString().padStart(2,'0');
      document.getElementById('pomo-time').textContent = `${m}:${s}`;
      document.getElementById('pomo-mode').textContent = Store.state.pomo.mode==='work' ? '🔴 Praca' : '🟢 Przerwa';
      document.getElementById('pomo-start').textContent = Store.state.pomo.running ? '⏸ Pauza' : '▶ Start';
    }
    function togglePomo() {
      Store.state.pomo.running = !Store.state.pomo.running;
      if(Store.state.pomo.running) { Store.state.pomo.lastTick = Date.now(); pomoInterval = setInterval(tickPomo, 1000); }
      else clearInterval(pomoInterval);
      updatePomoUI(); Store.save();
    }
    function tickPomo() {
      const delta = Math.floor((Date.now()-Store.state.pomo.lastTick)/1000);
      if(delta>=1) { Store.state.pomo.time -= delta; Store.state.pomo.lastTick = Date.now(); }
      if(Store.state.pomo.time<=0) switchPomoMode();
      updatePomoUI(); Store.save();
    }
    function resetPomo() { clearInterval(pomoInterval); Store.state.pomo.running=false; Store.state.pomo.time = Store.state.pomo.mode==='work' ? Store.state.pomo.work*60 : Store.state.pomo.break*60; updatePomoUI(); Store.save(); }
    function switchPomoMode() {
      clearInterval(pomoInterval); Store.state.pomo.running=false;
      if(Store.state.pomo.mode==='work') { Store.state.pomo.mode='break'; alert('💡 Czas na przerwę!'); }
      else { Store.state.pomo.mode='work'; alert('🎯 Czas wracać do pracy!'); }
      resetPomo();
    }

    // === 4. MINDMAP ENGINE (Zoom, Pan, Drag-Drop Link, Hover Menu) ===
    const viewport = document.getElementById('mm-viewport');
    const world = document.getElementById('mm-world');
    const svg = document.getElementById('mm-svg');
    let vp = { x: Store.state.mm.panX, y: Store.state.mm.panY, scale: Store.state.mm.zoom || 1 };
    let nodes = Store.state.mm.nodes, links = Store.state.mm.links;
    let flashMode = false, selectedNode = null, dragNode = null, dragOff = {x:0,y:0};
    let hoverMenu = document.getElementById('node-hover-menu');
    let menuHideTimer = null;

    function updateTransform() {
      world.style.transform = `translate(${vp.x}px, ${vp.y}px) scale(${vp.scale})`;
      Store.state.mm.panX = vp.x; Store.state.mm.panY = vp.y; Store.state.mm.zoom = vp.scale;
    }
    updateTransform();

    // Zoom
    viewport.onwheel = e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      vp.scale = Math.min(2.5, Math.max(0.2, vp.scale + delta));
      updateTransform(); Store.save();
    };

    // Pan (Background Drag)
    let isPanning = false, panStart = {x:0,y:0};
    viewport.onmousedown = e => {
      if(e.target.closest('.node')) return;
      isPanning = true; panStart = {x: e.clientX - vp.x, y: e.clientY - vp.y};
      viewport.classList.add('panning');
    };
    window.onmousemove = e => {
      if(isPanning) { vp.x = e.clientX - panStart.x; vp.y = e.clientY - panStart.y; updateTransform(); Store.save(); }
      if(dragNode) {
        const wx = (e.clientX - vp.x) / vp.scale - dragOff.x;
        const wy = (e.clientY - vp.y) / vp.scale - dragOff.y;
        dragNode.el.style.left = wx + 'px'; dragNode.el.style.top = wy + 'px';
        dragNode.data.x = wx; dragNode.data.y = wy;
        drawLines();
      }
    };
    window.onmouseup = e => {
      isPanning = false; viewport.classList.remove('panning');
      if(dragNode) {
        // Check drop on another node
        const wx = (e.clientX - vp.x) / vp.scale;
        const wy = (e.clientY - vp.y) / vp.scale;
        const target = nodes.find(n => n.id !== dragNode.data.id && Math.hypot(n.x - wx, n.y - wy) < 60);
        if(target && !links.find(l => (l.from===dragNode.data.id && l.to===target.id) || (l.from===target.id && l.to===dragNode.data.id))) {
          links.push({from: dragNode.data.id, to: target.id}); Store.save(); renderNodes(); drawLines();
        }
        dragNode = null; Store.save();
      }
    };

    function renderNodes() {
      world.querySelectorAll('.node').forEach(n => n.remove());
      nodes.forEach(n => {
        const el = document.createElement('div');
        el.className = 'node'; el.dataset.id = n.id;
        el.style.left = n.x + 'px'; el.style.top = n.y + 'px';
        if(n.color) el.style.background = n.color;
        if(flashMode && n.id !== nodes[0]?.id) el.classList.add('flashcard-blur');
        el.textContent = n.text;
        world.appendChild(el);

        el.onmousedown = e => {
          e.stopPropagation();
          if(flashMode) { el.classList.remove('flashcard-blur'); return; }
          selectedNode = n;
          dragNode = { el, data: n, off: {x: (e.clientX - vp.x)/vp.scale - n.x, y: (e.clientY - vp.y)/vp.scale - n.y} };
          dragNode.el.classList.add('selected');
        };
        el.ondblclick = () => { const t = prompt('Edytuj:', n.text); if(t!==null) { n.text=t; Store.save(); renderNodes(); }};
        el.onmouseenter = () => showHoverMenu(n, el);
        el.onmouseleave = () => setTimeout(()=>{ if(!hoverMenu.matches(':hover')) hideHoverMenu(); }, 200);
      });
    }

    function drawLines() {
      svg.innerHTML = '';
      links.forEach(l => {
        const a = nodes.find(n=>n.id===l.from), b = nodes.find(n=>n.id===l.to);
        if(!a||!b) return;
        const line = document.createElementNS('http://www.w3.org/2000/svg','line');
        line.setAttribute('x1', a.x+50); line.setAttribute('y1', a.y+16);
        line.setAttribute('x2', b.x+50); line.setAttribute('y2', b.y+16);
        svg.appendChild(line);
      });
    }

    // Hover Menu
    const paletteColors = ['#0b1120','#1e293b','#334155','#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#6366f1','#a855f7','#ec4899'];
    document.getElementById('palette-grid').innerHTML = paletteColors.map(c => `<div class="color-dot" style="background:${c}"></div>`).join('');
    document.querySelectorAll('#palette-grid .color-dot').forEach(dot => dot.onclick = () => { selectedNode.color = dot.style.backgroundColor; Store.save(); renderNodes(); hideHoverMenu(); });
    document.getElementById('del-links-btn').onclick = () => { if(!selectedNode) return; links = links.filter(l => l.from !== selectedNode.id && l.to !== selectedNode.id); Store.save(); renderNodes(); drawLines(); hideHoverMenu(); };

    function showHoverMenu(node, el) {
      selectedNode = node;
      const rect = el.getBoundingClientRect();
      hoverMenu.style.left = (rect.left + window.scrollX) + 'px';
      hoverMenu.style.top = (rect.bottom + window.scrollY + 8) + 'px';
      hoverMenu.classList.add('visible');
    }
    function hideHoverMenu() { hoverMenu.classList.remove('visible'); }
    hoverMenu.onmouseleave = hideHoverMenu;

    document.getElementById('mm-add').onclick = () => {
      const id = Date.now();
      nodes.push({id, x: (-vp.x + innerWidth/2 - vp.x*0.5)/vp.scale + (Math.random()*100-50), y: (-vp.y + innerHeight/2 - vp.y*0.5)/vp.scale + (Math.random()*100-50), text:'Nowy', color:''});
      Store.save(); renderNodes(); drawLines();
    };
    document.getElementById('mm-flashcard').onclick = () => { flashMode=!flashMode; document.getElementById('mm-flashcard').classList.toggle('active',flashMode); renderNodes(); };

    // Export/Import
    document.getElementById('mm-exp-json').onclick = () => { const b=new Blob([JSON.stringify({nodes,links},null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='mapa.json'; a.click(); };
    document.getElementById('mm-imp-json').onclick = () => { const i=document.createElement('input'); i.type='file'; i.accept='.json'; i.onchange=e=>{ const f=e.target.files[0]; const r=new FileReader(); r.onload=()=>{ const d=JSON.parse(r.result); nodes=d.nodes||[]; links=d.links||[]; Store.save(); renderNodes(); drawLines(); }; r.readAsText(f); }; i.click(); };
    document.getElementById('mm-exp-png').onclick = async () => {
      const orig = {x:vp.x, y:vp.y, s:vp.scale};
      vp.x=0; vp.y=0; vp.scale=1; updateTransform();
      setTimeout(async () => {
        const c = await html2canvas(viewport, {backgroundColor:'#0b1120', scale:2});
        const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='mapa.png'; a.click();
        vp=orig; updateTransform();
      }, 300);
    };

    // === 5. SETTINGS & ROUTER ===
    const applyTheme = () => {
      const p=document.getElementById('set-primary').value, s=document.getElementById('set-secondary').value;
      const fm=document.getElementById('set-font-main').value, sp=parseFloat(document.getElementById('set-vis-speed').value);
      document.documentElement.style.setProperty('--primary',p); document.documentElement.style.setProperty('--secondary',s);
      document.documentElement.style.setProperty('--font-main',fm); speed=sp;
      Store.state.settings = {primary:p, secondary:s, fontMain:fm, speed:sp}; Store.save();
    };
    ['set-primary','set-secondary','set-font-main','set-vis-speed'].forEach(id => document.getElementById(id).oninput = applyTheme);
    document.getElementById('set-reset').onclick = () => { if(confirm('Usunąć wszystkie dane?')) { localStorage.removeItem(Store.key); location.reload(); }};

    const dockBtns = document.querySelectorAll('.dock-btn[data-view]');
    const views = document.querySelectorAll('.view');
    window.addEventListener('hashchange', () => {
      const h = location.hash.slice(1)||'mindmap';
      dockBtns.forEach(b=>b.classList.toggle('active', b.dataset.view===h));
      views.forEach(v=>v.classList.toggle('active', v.id===`view-${h}`));
    });
    dockBtns.forEach(b=>b.addEventListener('click', ()=>location.hash=b.dataset.view));
    if(!location.hash) location.hash = 'mindmap';

    // === 6. BG CANVAS ===
    const cvs = document.getElementById('bg-canvas'), ctx = cvs.getContext('2d');
    let speed = Store.state.settings.speed || 0.8;
    let blobs = Array(10).fill().map(()=>({x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:60+Math.random()*120, vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8, hue:Math.random()*360}));
    function drawBg() {
      ctx.fillStyle = 'rgba(11,17,32,0.12)'; ctx.fillRect(0,0,innerWidth,innerHeight);
      blobs.forEach(b => {
        b.x += b.vx*speed; b.y += b.vy*speed; b.hue += 0.3;
        if(b.x<-b.r||b.x>innerWidth+b.r) b.vx*=-1; if(b.y<-b.r||b.y>innerHeight+b.r) b.vy*=-1;
        const g = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
        g.addColorStop(0, `hsla(${b.hue}, 65%, 55%, 0.25)`); g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
      });
      requestAnimationFrame(drawBg);
    }
    window.addEventListener('resize', ()=>{cvs.width=innerWidth; cvs.height=innerHeight;});
    cvs.width=innerWidth; cvs.height=innerHeight; drawBg();

    if(Store.state.settings) {
      document.getElementById('set-primary').value = Store.state.settings.primary;
      document.getElementById('set-secondary').value = Store.state.settings.secondary;
      document.getElementById('set-font-main').value = Store.state.settings.fontMain;
      document.getElementById('set-vis-speed').value = Store.state.settings.speed;
      applyTheme();
    }
    renderNodes(); drawLines();
  </script>
</body>
</html>
