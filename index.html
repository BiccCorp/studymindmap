<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --primary: #7c3aed;
  --secondary: #06b6d4;
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.1);
  --text: #f0f0f5;
  --text-muted: rgba(240,240,245,0.45);
  --font-main: 'Space Grotesk', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.6);
  --blob-speed: 1;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:var(--font-main); overflow:hidden; user-select:none; }

/* ── CANVAS BG ── */
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ── APP ── */
#app { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; }
.view { flex:1; display:none; flex-direction:column; opacity:0; transform:translateY(12px); transition:opacity .3s ease, transform .3s ease; overflow:hidden; }
.view.active { display:flex; }
.view.visible { opacity:1; transform:translateY(0); }

/* ── MINDMAP ── */
#view-mindmap { position:relative; }
#mm-toolbar {
  position:absolute; top:16px; left:50%; transform:translateX(-50%); z-index:50;
  display:flex; gap:6px; background:rgba(10,10,15,0.85); backdrop-filter:blur(16px);
  border:1px solid var(--glass-border); border-radius:40px; padding:7px 12px; box-shadow:var(--shadow);
}
#mm-toolbar button {
  background:none; border:none; color:var(--text-muted); font-size:12px; font-family:var(--font-main);
  padding:5px 11px; border-radius:20px; cursor:pointer; transition:all .2s; white-space:nowrap;
}
#mm-toolbar button:hover { background:var(--surface-hover); color:var(--text); }
#mm-toolbar button.active { background:var(--primary); color:#fff; }

#mm-viewport { position:absolute; inset:0; overflow:hidden; cursor:grab; }
#mm-viewport.grabbing { cursor:grabbing; }
#mm-world { position:absolute; top:0; left:0; width:4000px; height:4000px; transform-origin:0 0; }
svg#mm-links { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; }
svg#mm-links line { stroke:var(--primary); stroke-width:2; stroke-opacity:0.45; stroke-dasharray:5 3; }

.mm-node {
  position:absolute; min-width:120px; max-width:240px;
  border-radius:var(--radius); border:1.5px solid var(--glass-border);
  background:rgba(20,20,30,0.9); backdrop-filter:blur(10px);
  color:var(--text); cursor:grab;
  transition:border-color .2s, box-shadow .2s, filter .3s;
  box-shadow:0 4px 16px rgba(0,0,0,0.3); z-index:10; overflow:hidden;
}
.mm-node:hover { border-color:var(--primary); z-index:20; }
.mm-node.drag-over { border-color:var(--secondary); box-shadow:0 0 0 2px var(--secondary); }
.mm-node.flashcard-blur { filter:blur(6px); }
.mm-node-title { padding:9px 14px 5px; font-size:13px; font-weight:600; line-height:1.3; }
.mm-node-desc { padding:0 14px 9px; font-size:11px; color:var(--text-muted); line-height:1.4; }
.mm-node-desc:empty { display:none; }

/* ── NODE CONTEXT MENU (fixed, stays on hover) ── */
#node-ctx {
  position:fixed; z-index:9999;
  background:rgba(10,10,18,0.97); backdrop-filter:blur(24px);
  border:1px solid var(--glass-border); border-radius:var(--radius);
  padding:12px; box-shadow:var(--shadow-lg);
  display:none; flex-direction:column; gap:8px; min-width:210px;
}
#node-ctx.show { display:flex; }
.color-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; }
.color-swatch {
  width:26px; height:26px; border-radius:6px; border:1.5px solid transparent;
  cursor:pointer; transition:transform .15s, border-color .15s;
}
.color-swatch:hover { transform:scale(1.2); border-color:#fff; }
.ctx-sep { height:1px; background:var(--glass-border); }
.ctx-btn {
  background:var(--surface); border:1px solid var(--glass-border); color:var(--text);
  font-family:var(--font-main); font-size:12px; padding:7px 10px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all .2s; text-align:left;
}
.ctx-btn:hover { background:var(--surface-hover); }
.ctx-btn.danger { background:rgba(255,80,80,0.08); border-color:rgba(255,80,80,0.2); color:#ff6060; }
.ctx-btn.danger:hover { background:rgba(255,80,80,0.18); }

/* ── INLINE EDITOR MODAL ── */
#inline-modal {
  position:fixed; inset:0; z-index:10000; display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
}
#inline-modal.show { display:flex; }
#inline-modal-box {
  background:rgba(14,14,22,0.98); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-lg);
  width:360px; display:flex; flex-direction:column; gap:14px;
}
#inline-modal-box h3 { font-size:14px; font-weight:600; color:var(--text-muted); }
.modal-input {
  background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm);
  color:var(--text); font-family:var(--font-main); font-size:14px; padding:10px 12px; width:100%;
  outline:none; transition:border-color .2s;
}
.modal-input:focus { border-color:var(--primary); }
.modal-textarea { min-height:80px; resize:vertical; }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; }
.modal-btn {
  padding:8px 18px; border-radius:var(--radius-sm); border:1px solid var(--glass-border);
  background:var(--surface); color:var(--text); font-family:var(--font-main);
  font-size:13px; font-weight:500; cursor:pointer; transition:all .2s;
}
.modal-btn.primary { background:var(--primary); border-color:var(--primary); color:#fff; }
.modal-btn:hover { background:var(--surface-hover); }
.modal-btn.primary:hover { filter:brightness(1.1); }

/* ── COLOR PICKER MODAL ── */
#color-picker-modal {
  position:fixed; inset:0; z-index:10000; display:none;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
}
#color-picker-modal.show { display:flex; }
#color-picker-box {
  background:rgba(14,14,22,0.98); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:24px; box-shadow:var(--shadow-lg);
  width:320px; display:flex; flex-direction:column; gap:16px;
}
#color-picker-box h3 { font-size:14px; font-weight:600; color:var(--text-muted); }
.cp-palette { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; }
.cp-swatch {
  width:100%; aspect-ratio:1; border-radius:8px; border:2px solid transparent;
  cursor:pointer; transition:transform .15s, border-color .15s;
}
.cp-swatch:hover { transform:scale(1.12); border-color:rgba(255,255,255,0.5); }
.cp-swatch.selected { border-color:#fff; transform:scale(1.08); }
.cp-custom { display:flex; align-items:center; gap:10px; }
.cp-custom label { font-size:12px; color:var(--text-muted); }
.cp-custom input[type="color"] {
  width:36px; height:30px; border:1px solid var(--glass-border); border-radius:6px;
  background:none; cursor:pointer; padding:2px;
}
.cp-preview {
  height:36px; border-radius:var(--radius-sm); border:1px solid var(--glass-border);
  transition:background .2s;
}

/* ── SETTINGS VIEW ── */
#view-settings { padding:60px 40px 100px; overflow-y:auto; align-items:center; }
.settings-card {
  width:100%; max-width:580px; background:var(--glass); border:1px solid var(--glass-border);
  border-radius:var(--radius); padding:28px 32px; margin-bottom:20px;
}
.settings-card h2 { font-size:13px; font-weight:600; color:var(--text-muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:20px; }
.setting-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04); gap:16px; }
.setting-row:last-child { border-bottom:none; }
.setting-row label { font-size:14px; color:var(--text); flex:1; }
.setting-row select, .setting-row input[type="range"] { background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-main); padding:6px 10px; font-size:13px; cursor:pointer; }
.setting-row input[type="range"] { padding:0; width:120px; accent-color:var(--primary); }

.color-btn {
  display:flex; align-items:center; gap:8px; padding:6px 12px;
  background:var(--surface); border:1px solid var(--glass-border);
  border-radius:var(--radius-sm); cursor:pointer; transition:all .2s;
  font-family:var(--font-main); font-size:13px; color:var(--text);
}
.color-btn:hover { background:var(--surface-hover); }
.color-btn-swatch { width:18px; height:18px; border-radius:4px; }

.btn-danger { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.25); color:#f87171; font-family:var(--font-main); font-size:13px; font-weight:500; padding:10px 20px; border-radius:var(--radius-sm); cursor:pointer; transition:all .2s; margin-top:8px; }
.btn-danger:hover { background:rgba(239,68,68,0.22); }

/* ── DOCK ── */
#dock {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:200;
  display:flex; gap:6px; background:rgba(10,10,15,0.88); backdrop-filter:blur(24px);
  border:1px solid var(--glass-border); border-radius:50px; padding:8px 10px; box-shadow:var(--shadow-lg);
}
.dock-btn { width:46px; height:46px; border:none; border-radius:50%; background:none; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; transition:background .2s, transform .15s; }
.dock-btn:hover { background:var(--surface-hover); transform:scale(1.1); }
.dock-btn.active { background:var(--primary); }

/* ── TOOLS DRAWER ── */
#tools-drawer {
  position:fixed; bottom:88px; left:50%; transform:translateX(-50%) translateY(12px); z-index:190;
  display:flex; gap:6px; background:rgba(10,10,15,0.88); backdrop-filter:blur(20px);
  border:1px solid var(--glass-border); border-radius:40px; padding:7px 10px; box-shadow:var(--shadow);
  opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;
}
#tools-drawer.open { opacity:1; pointer-events:all; transform:translateX(-50%) translateY(0); }
.tool-btn { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:12px; font-family:var(--font-main); font-weight:500; padding:6px 12px; border-radius:20px; transition:all .2s; white-space:nowrap; }
.tool-btn:hover { background:var(--surface-hover); color:var(--text); }
.tool-btn.active { background:var(--primary); color:#fff; }

/* ── FLOAT WINDOWS ── */
.float-win { position:fixed; background:rgba(10,10,18,0.92); backdrop-filter:blur(24px); border:1px solid var(--glass-border); border-radius:var(--radius); box-shadow:var(--shadow-lg); display:none; flex-direction:column; z-index:300; overflow:hidden; }
.float-win.visible { display:flex; }
.win-header { display:flex; align-items:center; justify-content:space-between; padding:11px 14px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--glass-border); cursor:move; gap:8px; }
.win-header span { font-size:13px; font-weight:600; flex:1; }
.win-close { background:none; border:none; color:var(--text-muted); font-size:15px; cursor:pointer; line-height:1; transition:color .2s; padding:2px 6px; border-radius:4px; }
.win-close:hover { color:#ff6060; background:rgba(255,96,96,0.1); }
.win-body { padding:14px; display:flex; flex-direction:column; gap:11px; }

/* ── POMODORO ── */
#win-pomodoro { width:262px; }
.pomo-display { text-align:center; padding:16px 0 6px; }
.pomo-time { font-size:50px; font-weight:700; letter-spacing:-2px; font-variant-numeric:tabular-nums; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.pomo-phase { font-size:12px; color:var(--text-muted); margin-top:4px; }
.pomo-cycle { font-size:11px; color:var(--text-muted); margin-top:2px; }
.pomo-controls { display:flex; gap:6px; }
.pomo-btn { flex:1; padding:8px; border-radius:var(--radius-sm); border:1px solid var(--glass-border); background:var(--surface); color:var(--text); font-family:var(--font-main); font-size:12px; font-weight:500; cursor:pointer; transition:all .2s; }
.pomo-btn:hover { background:var(--primary); border-color:var(--primary); }
.pomo-settings { display:flex; gap:8px; }
.pomo-ig { flex:1; }
.pomo-ig label { font-size:10px; color:var(--text-muted); display:block; margin-bottom:4px; }
.pomo-ig input { width:100%; background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-main); font-size:13px; padding:6px 8px; text-align:center; outline:none; }
.pomo-ig input:focus { border-color:var(--primary); }

/* ── RADIO ── */
#win-radio { width:300px; }
.radio-stations { display:flex; flex-direction:column; gap:5px; max-height:140px; overflow-y:auto; }
.radio-station-item {
  display:flex; align-items:center; gap:6px; padding:7px 10px;
  background:var(--surface); border-radius:var(--radius-sm); border:1px solid transparent;
  cursor:pointer; transition:all .2s;
}
.radio-station-item:hover { background:var(--surface-hover); border-color:var(--glass-border); }
.radio-station-item.playing { border-color:var(--primary); background:rgba(124,58,237,0.1); }
.radio-station-name { flex:1; font-size:13px; font-weight:500; }
.radio-station-del { background:none; border:none; color:var(--text-muted); font-size:13px; cursor:pointer; padding:2px 5px; border-radius:3px; transition:color .2s; }
.radio-station-del:hover { color:#ff6060; }
.radio-add-row { display:flex; flex-direction:column; gap:5px; }
.radio-add-row input { background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-main); font-size:12px; padding:7px 9px; outline:none; }
.radio-add-row input:focus { border-color:var(--primary); }
.radio-add-row input::placeholder { color:var(--text-muted); }
.radio-add-btn { padding:7px; border-radius:var(--radius-sm); border:1px solid var(--primary); background:rgba(124,58,237,0.12); color:var(--primary); font-family:var(--font-main); font-size:12px; cursor:pointer; transition:all .2s; }
.radio-add-btn:hover { background:var(--primary); color:#fff; }
.radio-controls { display:flex; align-items:center; gap:8px; }
.radio-play-btn { padding:7px 14px; border-radius:var(--radius-sm); border:1px solid var(--primary); background:rgba(124,58,237,0.12); color:var(--primary); font-family:var(--font-main); font-size:13px; cursor:pointer; transition:all .2s; }
.radio-play-btn:hover { background:var(--primary); color:#fff; }
.radio-status { font-size:11px; color:var(--text-muted); min-height:14px; }
.radio-vol { display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-muted); }
.radio-vol input { flex:1; accent-color:var(--secondary); }

/* ── GRAMOPHONE ── */
.radio-gram { display:flex; justify-content:center; align-items:center; padding:6px 0 2px; }
.gram-wrap { position:relative; width:70px; height:70px; }
.gram-disc {
  width:70px; height:70px; border-radius:50%;
  background:conic-gradient(from 0deg, #1a1a2e 0%, #2d1b69 25%, #1a1a2e 50%, #2d1b69 75%, #1a1a2e 100%);
  border:3px solid rgba(255,255,255,0.08);
  display:flex; align-items:center; justify-content:center;
  transition:animation .3s;
}
.gram-disc.spinning { animation:spin 2s linear infinite; }
.gram-center { width:14px; height:14px; border-radius:50%; background:var(--primary); box-shadow:0 0 8px var(--primary); }
.gram-arm {
  position:absolute; top:6px; right:-12px;
  width:36px; height:4px; background:rgba(255,255,255,0.3);
  border-radius:2px; transform-origin:right center;
  transform:rotate(-30deg); transition:transform .5s ease;
}
.gram-arm.playing { transform:rotate(-18deg); }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

/* ── NOTEPAD ── */
#win-notepad { width:320px; }
#notepad-area { width:100%; height:200px; resize:none; background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:13px; line-height:1.6; padding:10px 12px; outline:none; }
#notepad-area:focus { border-color:var(--primary); }

/* ── CHECKLIST ── */
#win-checklist { width:300px; }
.check-add { display:flex; gap:6px; }
.check-add input { flex:1; background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-main); font-size:13px; padding:7px 10px; outline:none; }
.check-add input:focus { border-color:var(--primary); }
.check-add input::placeholder { color:var(--text-muted); }
.check-add button { padding:7px 12px; border-radius:var(--radius-sm); border:1px solid var(--primary); background:rgba(124,58,237,0.12); color:var(--primary); font-size:16px; cursor:pointer; transition:all .2s; }
.check-add button:hover { background:var(--primary); color:#fff; }
.check-list { display:flex; flex-direction:column; gap:4px; max-height:220px; overflow-y:auto; }
.check-item { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:var(--radius-sm); background:var(--surface); transition:background .15s; }
.check-item:hover { background:var(--surface-hover); }
.check-item input[type="checkbox"] { accent-color:var(--primary); cursor:pointer; }
.check-item span { flex:1; font-size:13px; transition:all .2s; }
.check-item.done span { text-decoration:line-through; color:var(--text-muted); }
.check-del { background:none; border:none; color:var(--text-muted); font-size:14px; cursor:pointer; padding:2px 4px; border-radius:3px; transition:color .2s; }
.check-del:hover { color:#ff6060; }

/* ── FLASHCARD TOOL ── */
#win-flashcards { width:340px; }
.fc-header-row { display:flex; gap:6px; align-items:center; }
.fc-deck-name { flex:1; background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-main); font-size:13px; padding:7px 10px; outline:none; }
.fc-deck-name:focus { border-color:var(--primary); }
.fc-small-btn { padding:7px 10px; border-radius:var(--radius-sm); border:1px solid var(--glass-border); background:var(--surface); color:var(--text); font-family:var(--font-main); font-size:12px; cursor:pointer; transition:all .2s; white-space:nowrap; }
.fc-small-btn:hover { background:var(--surface-hover); }
.fc-small-btn.accent { border-color:var(--primary); color:var(--primary); background:rgba(124,58,237,0.08); }
.fc-small-btn.accent:hover { background:var(--primary); color:#fff; }
.fc-card-area { position:relative; height:160px; perspective:800px; cursor:pointer; }
.fc-card {
  position:absolute; inset:0; transform-style:preserve-3d;
  transition:transform .5s ease; border-radius:var(--radius);
  border:1px solid var(--glass-border);
}
.fc-card.flipped { transform:rotateY(180deg); }
.fc-face {
  position:absolute; inset:0; backface-visibility:hidden; border-radius:var(--radius);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:20px; text-align:center;
}
.fc-front { background:rgba(124,58,237,0.1); }
.fc-back { background:rgba(6,182,212,0.08); transform:rotateY(180deg); }
.fc-face-label { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:8px; }
.fc-face-text { font-size:15px; font-weight:500; line-height:1.4; }
.fc-nav { display:flex; align-items:center; justify-content:space-between; }
.fc-counter { font-size:12px; color:var(--text-muted); }
.fc-nav-btns { display:flex; gap:6px; }
.fc-add-row { display:flex; flex-direction:column; gap:5px; }
.fc-add-row input, .fc-add-row textarea { background:var(--surface); border:1px solid var(--glass-border); border-radius:var(--radius-sm); color:var(--text); font-family:var(--font-main); font-size:12px; padding:7px 9px; outline:none; width:100%; resize:none; }
.fc-add-row input:focus, .fc-add-row textarea:focus { border-color:var(--primary); }
.fc-add-row input::placeholder, .fc-add-row textarea::placeholder { color:var(--text-muted); }
.fc-tabs { display:flex; gap:5px; }
.fc-tab { flex:1; padding:5px; border-radius:var(--radius-sm); border:1px solid var(--glass-border); background:var(--surface); color:var(--text-muted); font-family:var(--font-main); font-size:11px; cursor:pointer; transition:all .2s; text-align:center; }
.fc-tab.active { background:var(--primary); border-color:var(--primary); color:#fff; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.22); }

/* ── TOAST ── */
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.toast { position:fixed; top:20px; right:20px; z-index:99999; background:rgba(20,20,30,0.97); border:1px solid var(--glass-border); border-radius:var(--radius-sm); padding:10px 16px; font-size:13px; box-shadow:var(--shadow); animation:toastIn .3s ease; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

          <div class="color-btn-swatch" id="swatch-secondary"></div>

<!-- NOTEPAD -->

<!-- NODE CONTEXT MENU -->

<script>
// ═══════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════
const STORE_KEY = 'studyos_v2';
let saveTimer = null;

const defaultState = () => ({
  view: 'mindmap',
  nodes: [{ id:'n1', x:1950, y:1950, title:'Moja Mapa', desc:'', color:'#1e1b4b' }],
  links: [],
  zoom: 1, pan: { x:0, y:0 },
  windows: {
    pomodoro: { visible:false, x:40, y:100 },
    radio: { visible:false, x:320, y:100 },
    notepad: { visible:false, x:40, y:380 },
    checklist: { visible:false, x:360, y:380 },
    flashcards: { visible:false, x:200, y:200 }
  },
  notes: '',
  checklist: [],
  pomodoro: { workMin:25, breakMin:5 },
  radioStations: [
    { name:'LoFi Beats', url:'https://streams.ilovemusic.de/iloveradio17.mp3' },
    { name:'Jazz 24', url:'https://live.amperwave.net/direct/ppm-jazz24aac-ibc1' }
  ],
  flashcards: [],
  settings: {
    primary: '#7c3aed',
    secondary: '#06b6d4',
    font: "'Space Grotesk', sans-serif",
    blobSpeed: 1
  }
});

let state;
try {
  const saved = localStorage.getItem(STORE_KEY);
  if (saved) {
    const p = JSON.parse(saved);
    state = { ...defaultState(), ...p };
    state.settings = { ...defaultState().settings, ...(p.settings||{}) };
    state.windows = { ...defaultState().windows, ...(p.windows||{}) };
    state.pomodoro = { ...defaultState().pomodoro, ...(p.pomodoro||{}) };
    if (!state.radioStations) state.radioStations = defaultState().radioStations;
    if (!state.flashcards) state.flashcards = [];
  } else { state = defaultState(); }
} catch(e) { state = defaultState(); }

function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
  }, 250);
}

// ═══════════════════════════════════════════════════
// CANVAS BLOBS
// ═══════════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let blobs = [];

function initBlobs() {
  const W = window.innerWidth, H = window.innerHeight;
  bgCanvas.width = W; bgCanvas.height = H;
  blobs = Array.from({length:10}, (_,i) => ({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.6, vy: (Math.random()-.5)*.6,
    r: 180+Math.random()*200,
    hue: [260,200,170,30,320][i%5],
    alpha: .06+Math.random()*.06
  }));
}

function animateBlobs() {
  const W = bgCanvas.width, H = bgCanvas.height;
  const spd = parseFloat(state.settings.blobSpeed)||1;
  bgCtx.clearRect(0,0,W,H);
  bgCtx.fillStyle = '#0a0a0f';
  bgCtx.fillRect(0,0,W,H);
  for (const b of blobs) {
    b.x += b.vx*spd; b.y += b.vy*spd;
    if (b.x < -b.r) b.x = W+b.r;
    if (b.x > W+b.r) b.x = -b.r;
    if (b.y < -b.r) b.y = H+b.r;
    if (b.y > H+b.r) b.y = -b.r;
    const g = bgCtx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
    g.addColorStop(0,`hsla(${b.hue},70%,55%,${b.alpha})`);
    g.addColorStop(1,`hsla(${b.hue},70%,55%,0)`);
    bgCtx.beginPath(); bgCtx.arc(b.x,b.y,b.r,0,Math.PI*2);
    bgCtx.fillStyle = g; bgCtx.fill();
  }
  requestAnimationFrame(animateBlobs);
}

window.addEventListener('resize', initBlobs);
initBlobs(); animateBlobs();

// ═══════════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════════
const views = { mindmap: document.getElementById('view-mindmap'), settings: document.getElementById('view-settings') };
const dockBtnsMap = { mindmap: document.getElementById('dock-mindmap'), settings: document.getElementById('dock-settings') };

function switchView(name) {
  if (!views[name]) return;
  state.view = name; schedSave();
  Object.entries(views).forEach(([k,el]) => {
    el.classList.remove('active','visible');
    if (dockBtnsMap[k]) dockBtnsMap[k].classList.remove('active');
  });
  views[name].classList.add('active');
  if (dockBtnsMap[name]) dockBtnsMap[name].classList.add('active');
  requestAnimationFrame(() => views[name].classList.add('visible'));
  if (name === 'mindmap') requestAnimationFrame(renderMindmap);
  location.hash = name;
}

document.getElementById('dock-mindmap').addEventListener('click', () => switchView('mindmap'));
document.getElementById('dock-settings').addEventListener('click', () => switchView('settings'));
window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#','');
  if (views[h]) switchView(h);
});

// ═══════════════════════════════════════════════════
// TOOLS DRAWER
// ═══════════════════════════════════════════════════
const toolsDrawer = document.getElementById('tools-drawer');
const dockTools = document.getElementById('dock-tools');

dockTools.addEventListener('click', e => {
  e.stopPropagation();
  const open = toolsDrawer.classList.toggle('open');
  dockTools.classList.toggle('active', open);
});
document.addEventListener('click', e => {
  if (!toolsDrawer.contains(e.target) && e.target !== dockTools)
    toolsDrawer.classList.remove('open'), dockTools.classList.remove('active');
});

// ═══════════════════════════════════════════════════
// FLOATING WINDOWS
// ═══════════════════════════════════════════════════
let topZ = 400;

function applyWinState(id) {
  const ws = state.windows[id];
  const el = document.getElementById('win-'+id);
  if (!el) return;
  if (ws.visible) {
    el.classList.add('visible');
    el.style.left = Math.max(0, Math.min(window.innerWidth-80, ws.x||40))+'px';
    el.style.top = Math.max(0, Math.min(window.innerHeight-80, ws.y||100))+'px';
  } else { el.classList.remove('visible'); }
}

function toggleWin(id) {
  if (!state.windows[id]) return;
  state.windows[id].visible = !state.windows[id].visible;
  applyWinState(id);
  document.querySelectorAll('.tool-btn[data-win="'+id+'"]').forEach(b => b.classList.toggle('active', state.windows[id].visible));
  schedSave();
}

Object.keys(state.windows).forEach(id => {
  applyWinState(id);
  document.querySelectorAll('.tool-btn[data-win="'+id+'"]').forEach(b => b.classList.toggle('active', state.windows[id].visible));
});

document.querySelectorAll('.tool-btn[data-win]').forEach(btn => btn.addEventListener('click', () => toggleWin(btn.dataset.win)));
document.querySelectorAll('.win-close[data-win]').forEach(btn => btn.addEventListener('click', () => toggleWin(btn.dataset.win)));
document.querySelectorAll('.float-win').forEach(win => win.addEventListener('mousedown', () => { win.style.zIndex = ++topZ; }));

// Drag windows
document.querySelectorAll('.win-header').forEach(header => {
  const win = header.closest('.float-win');
  let dragging=false, ox=0, oy=0;
  header.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-close')) return;
    dragging=true; ox=e.clientX-win.offsetLeft; oy=e.clientY-win.offsetTop;
    win.style.zIndex = ++topZ; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const nx = Math.max(0, Math.min(window.innerWidth-60, e.clientX-ox));
    const ny = Math.max(0, Math.min(window.innerHeight-60, e.clientY-oy));
    win.style.left = nx+'px'; win.style.top = ny+'px';
    const id = win.dataset.winId;
    if (state.windows[id]) { state.windows[id].x=nx; state.windows[id].y=ny; }
    schedSave();
  });
  document.addEventListener('mouseup', () => { dragging=false; });
});

// ═══════════════════════════════════════════════════
// POMODORO
// ═══════════════════════════════════════════════════
let pomoState = { running:false, isBreak:false, cycle:1, endTime:null, remaining:null };
let pomoInterval = null;
const pomoTimeEl = document.getElementById('pomo-time');
const pomoPhaseEl = document.getElementById('pomo-phase');
const pomoCycleEl = document.getElementById('pomo-cycle');
const pomoWorkIn = document.getElementById('pomo-work-min');
const pomoBreakIn = document.getElementById('pomo-break-min');
pomoWorkIn.value = state.pomodoro.workMin;
pomoBreakIn.value = state.pomodoro.breakMin;

function fmt(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

function pomoReset() {
  clearInterval(pomoInterval); pomoInterval=null;
  pomoState = { running:false, isBreak:false, cycle:1, endTime:null, remaining:(parseInt(pomoWorkIn.value)||25)*60 };
  pomoTimeEl.textContent = fmt(pomoState.remaining);
  pomoPhaseEl.textContent = 'Czas pracy'; pomoCycleEl.textContent = 'Cykl 1';
}

function pomoTick() {
  const rem = Math.max(0, Math.round((pomoState.endTime - Date.now())/1000));
  pomoState.remaining = rem; pomoTimeEl.textContent = fmt(rem);
  if (rem <= 0) {
    clearInterval(pomoInterval); pomoInterval=null; pomoState.running=false;
    pomoState.isBreak = !pomoState.isBreak;
    if (!pomoState.isBreak) pomoState.cycle++;
    const dur = pomoState.isBreak ? (parseInt(pomoBreakIn.value)||5) : (parseInt(pomoWorkIn.value)||25);
    const label = pomoState.isBreak ? '☕ Przerwa' : '💪 Czas pracy';
    pomoPhaseEl.textContent = label; pomoCycleEl.textContent = `Cykl ${pomoState.cycle}`;
    pomoState.remaining = dur*60; pomoTimeEl.textContent = fmt(pomoState.remaining);
    showToast(`${label}! Czas: ${dur} min`); pomoStart();
  }
}

function pomoStart() {
  if (pomoState.running) return;
  pomoState.running=true;
  pomoState.endTime = Date.now() + (pomoState.remaining||((parseInt(pomoWorkIn.value)||25)*60))*1000;
  pomoInterval = setInterval(pomoTick, 500);
  pomoPhaseEl.textContent = pomoState.isBreak ? '☕ Przerwa' : '💪 Czas pracy';
}

function pomoPause() {
  if (!pomoState.running) return;
  clearInterval(pomoInterval); pomoInterval=null; pomoState.running=false;
  pomoState.remaining = Math.max(0, Math.round((pomoState.endTime-Date.now())/1000));
}

document.getElementById('pomo-start').addEventListener('click', pomoStart);
document.getElementById('pomo-pause').addEventListener('click', pomoPause);
document.getElementById('pomo-reset').addEventListener('click', pomoReset);
[pomoWorkIn,pomoBreakIn].forEach(inp => inp.addEventListener('change', () => {
  state.pomodoro.workMin = parseInt(pomoWorkIn.value)||25;
  state.pomodoro.breakMin = parseInt(pomoBreakIn.value)||5;
  if (!pomoState.running) pomoReset(); schedSave();
}));
pomoReset();

// ═══════════════════════════════════════════════════
// RADIO
// ═══════════════════════════════════════════════════
let radioAudio = new Audio();
radioAudio.crossOrigin = 'anonymous';
let radioPlaying = false;
let radioActiveIdx = -1;
const gramDisc = document.getElementById('gram-disc');
const gramArm = document.getElementById('gram-arm');

function renderStations() {
  const container = document.getElementById('radio-stations');
  container.innerHTML = '';
  (state.radioStations||[]).forEach((st, i) => {
    const div = document.createElement('div');
    div.className = 'radio-station-item' + (i===radioActiveIdx?' playing':'');
    div.innerHTML = `<span class="radio-station-name">${escHtml(st.name)}</span><button class="radio-station-del" data-i="${i}">✕</button>`;
    div.addEventListener('click', e => {
      if (e.target.classList.contains('radio-station-del')) return;
      radioActiveIdx = i; renderStations();
      const btn = document.getElementById('radio-play-btn');
      if (radioPlaying) { radioAudio.pause(); radioPlaying=false; }
      radioAudio.src = st.url; radioAudio.load();
      document.getElementById('radio-status').textContent = 'Ładowanie...';
      radioAudio.play().then(() => {
        radioPlaying=true; btn.textContent='⏸ Pauza';
        document.getElementById('radio-status').textContent = '▶ ' + st.name;
        gramDisc.classList.add('spinning'); gramArm.classList.add('playing');
      }).catch(() => {

        gramDisc.classList.remove('spinning'); gramArm.classList.remove('playing');
      });
    });

      gramDisc.classList.remove('spinning'); gramArm.classList.remove('playing');

const viewport = document.getElementById('mm-viewport');
const world = document.getElementById('mm-world');

let mmZoom = state.zoom||1;
let mmPan = { ...(state.pan||{x:0,y:0}) };
let flashcardMode = false;
let nodeIdCounter = Date.now();

function applyTransform() { world.style.transform = `translate(${mmPan.x}px,${mmPan.y}px) scale(${mmZoom})`; }
function saveMapState() { state.zoom=mmZoom; state.pan={...mmPan}; schedSave(); }

function centerMap() {
  if (state.nodes.length > 0) {
    const n = state.nodes[0];
    mmPan.x = window.innerWidth/2 - n.x*mmZoom;
    mmPan.y = window.innerHeight/2 - n.y*mmZoom;
  }
  applyTransform();
}

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const delta = e.deltaY>0 ? 0.9 : 1.1;
  const nz = Math.min(2.5, Math.max(0.2, mmZoom*delta));
  mmPan.x = mx-(mx-mmPan.x)*(nz/mmZoom);
  mmPan.y = my-(my-mmPan.y)*(nz/mmZoom);
  mmZoom=nz; applyTransform(); saveMapState();
}, {passive:false});

let isPanning=false, panStart={x:0,y:0}, panOrigin={x:0,y:0};
viewport.addEventListener('mousedown', e => {
  if (e.target!==viewport && e.target!==world && e.target!==svgLinks) return;
  isPanning=true; panStart={x:e.clientX,y:e.clientY}; panOrigin={...mmPan};
  viewport.classList.add('grabbing');
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  mmPan.x=panOrigin.x+(e.clientX-panStart.x);
  mmPan.y=panOrigin.y+(e.clientY-panStart.y);
  applyTransform();
});
document.addEventListener('mouseup', () => {
  if (isPanning) { isPanning=false; viewport.classList.remove('grabbing'); saveMapState(); }
});

function renderLinks() {
  svgLinks.innerHTML='';
  (state.links||[]).forEach(l => {
    const a=state.nodes.find(n=>n.id===l.from), b=state.nodes.find(n=>n.id===l.to);
    if (!a||!b) return;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', a.x+70); line.setAttribute('y1', a.y+30);
    line.setAttribute('x2', b.x+70); line.setAttribute('y2', b.y+30);
    svgLinks.appendChild(line);
  });
}

function renderMindmap() {
  world.querySelectorAll('.mm-node').forEach(n=>n.remove());
  renderLinks();
  state.nodes.forEach((node,idx) => {
    const el = document.createElement('div');
    el.className = 'mm-node';
    el.dataset.id = node.id;
    el.style.left = node.x+'px'; el.style.top = node.y+'px';
    if (node.color) el.style.background = node.color;
    el.innerHTML = `<div class="mm-node-title">${escHtml(node.title||node.text||'')}</div><div class="mm-node-desc">${escHtml(node.desc||'')}</div>`;
    if (flashcardMode && idx>0) el.classList.add('flashcard-blur');
    if (flashcardMode && idx>0) el.addEventListener('click', e => { e.stopPropagation(); el.classList.remove('flashcard-blur'); });
    makeNodeDraggable(el, node);
    world.appendChild(el);
  });
}

// ── NODE DRAGGING & HOVER ──
function makeNodeDraggable(el, node) {
  let dragging=false, ox=0, oy=0, lastDropTarget=null, didDrag=false;
  let hoverTimer=null;

  el.addEventListener('mouseenter', e => {
    clearTimeout(hoverTimer); hoverTimer=null;
    clearTimeout(ctxLeaveTimer);
    if (!dragging) showCtx(e, node, el);
  });
  el.addEventListener('mousemove', e => {
    if (!dragging && nodeCtx.classList.contains('show') && ctxNode===node) {
      // keep menu roughly near cursor
      // don't reposition aggressively, just clear hide timer
      clearTimeout(ctxLeaveTimer);
    }
  });
  el.addEventListener('mouseleave', () => {
    hoverTimer = setTimeout(() => {
      ctxLeaveTimer = setTimeout(hideCtx, 220);
    }, 80);
  });

  el.addEventListener('mousedown', e => {
    if (e.button!==0) return;
    e.stopPropagation();
    dragging=true; didDrag=false;
    ox=(e.clientX-mmPan.x)/mmZoom - node.x;
    oy=(e.clientY-mmPan.y)/mmZoom - node.y;
    el.style.zIndex=30; hideCtx();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    didDrag=true;
    const nx=(e.clientX-mmPan.x)/mmZoom-ox;
    const ny=(e.clientY-mmPan.y)/mmZoom-oy;
    node.x=nx; node.y=ny;
    el.style.left=nx+'px'; el.style.top=ny+'px';
    renderLinks();
    const mx=(e.clientX-mmPan.x)/mmZoom, my=(e.clientY-mmPan.y)/mmZoom;
    if (lastDropTarget) { lastDropTarget.classList.remove('drag-over'); lastDropTarget=null; }
    world.querySelectorAll('.mm-node').forEach(other => {
      if (other===el) return;
      const on=state.nodes.find(n=>n.id===other.dataset.id); if(!on) return;
      const dx=mx-(on.x+70), dy=my-(on.y+30);
      if (Math.sqrt(dx*dx+dy*dy)<65) { other.classList.add('drag-over'); lastDropTarget=other; }
    });
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging=false; el.style.zIndex=10;
    if (lastDropTarget) {
      lastDropTarget.classList.remove('drag-over');
      const tid=lastDropTarget.dataset.id;
      const linked=state.links.some(l=>(l.from===node.id&&l.to===tid)||(l.from===tid&&l.to===node.id));
      if (!linked&&tid!==node.id) { state.links.push({from:node.id,to:tid}); renderLinks(); }
      lastDropTarget=null;
    }
    schedSave();
  });
}

  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Close ctx on general click ──
document.addEventListener('mousedown', e => {
  if (!nodeCtx.contains(e.target) && !e.target.classList.contains('mm-node') && !e.target.closest('.mm-node')) {
    hideCtx();
  }
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init() {
  const h = location.hash.replace('#','')||state.view||'mindmap';
  switchView(views[h] ? h : 'mindmap');
  renderMindmap();
  if (!state.pan||(state.pan.x===0&&state.pan.y===0)) centerMap();
  else applyTransform();
}

init();
</script>
</body>
