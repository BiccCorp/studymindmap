<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS - Fixed</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --primary: #7c3aed;
  --secondary: #06b6d4;
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.1);
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --font-main: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* Background Canvas */
#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  z-index: 0;
  pointer-events: none;
}

/* Mindmap Workspace */
#mm-container {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  overflow: hidden;
  cursor: grab;
}
#mm-container:active { cursor: grabbing; }
#mm-viewport {
  position: absolute;
  transform-origin: 0 0;
  will-change: transform;
}
#mm-svg {
  position: absolute;
  top: 0; left: 0;
  width: 10000px;
  height: 10000px;
  pointer-events: none;
  z-index: 0;
}
.mm-line {
  stroke: var(--primary);
  stroke-width: 2;
  stroke-linecap: round;
  opacity: 0.4;
  fill: none;
}

.mm-node {
  position: absolute;
  min-width: 120px;
  padding: 12px 20px;
  background: rgba(15, 15, 25, 0.8);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  z-index: 2;
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.2s;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-weight: 500;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.mm-node:hover {
  border-color: var(--primary);
  box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
  transform: scale(1.02);
}
.mm-node.root {
  border: 2px solid var(--primary);
  font-size: 1.2rem;
  font-weight: 700;
  background: rgba(124, 58, 237, 0.1);
}

/* Node Context Menu (The floating box) */
#node-ctx {
  position: fixed;
  display: none;
  z-index: 9999;
  background: rgba(20, 20, 30, 0.95);
  backdrop-filter: blur(16px);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 12px;
  min-width: 180px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  /* Dodajemy lekkie przesunięcie, żeby okienko było bliżej kursora */
  margin-top: 5px; 
}
.ctx-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.ctx-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: white;
  padding: 8px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}
.ctx-btn:hover { background: var(--surface-hover); border-color: var(--primary); }
.ctx-input {
  width: 100%;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  color: white;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 8px;
  font-family: inherit;
}

/* Sidebar & Windows */
.sidebar {
  position: fixed;
  left: 20px; top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 100;
  background: var(--surface);
  backdrop-filter: blur(10px);
  padding: 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.side-btn {
  width: 45px; height: 45px;
  border-radius: 12px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.side-btn:hover { background: var(--surface-hover); color: var(--primary); }

.win {
  position: fixed;
  width: 320px;
  background: rgba(15, 15, 25, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 20px;
  z-index: 200;
  display: none;
  flex-direction: column;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
.win-head {
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: move;
  border-bottom: 1px solid var(--border);
}
.win-body { padding: 20px; overflow-y: auto; max-height: 400px; }

/* Settings specifics */
.settings-group { margin-bottom: 15px; }
.settings-label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px; display: block; }
.color-picker { display: flex; gap: 10px; align-items: center; }
.swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; }

/* Floating Controls */
.controls {
  position: fixed;
  bottom: 20px; right: 20px;
  display: flex; gap: 10px;
  z-index: 100;
}
.ctrl-btn {
  padding: 10px 20px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  backdrop-filter: blur(10px);
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="mm-container">
  <div id="mm-viewport">
    <svg id="mm-svg"></svg>
    <div id="mm-nodes-layer"></div>
  </div>
</div>

<div id="node-ctx">
  <input type="text" id="node-input" class="ctx-input" placeholder="Treść węzła...">
  <div class="ctx-row">
    <button class="ctx-btn" onclick="addChildNode()">+ Podrzędny</button>
    <button class="ctx-btn" onclick="deleteNode()" style="color: #ef4444;">Usuń</button>
  </div>
  <div class="ctx-row">
    <button class="ctx-btn" onclick="setNodeColor('#7c3aed')">Fiolet</button>
    <button class="ctx-btn" onclick="setNodeColor('#06b6d4')">Błękit</button>
    <button class="ctx-btn" onclick="setNodeColor('#10b981')">Zieleń</button>
  </div>
</div>

<div class="sidebar">
  <button class="side-btn" onclick="toggleWin('win-settings')" title="Ustawienia">⚙️</button>
  <button class="side-btn" onclick="resetView()" title="Wyśrodkuj">🎯</button>
  <button class="side-btn" onclick="exportJSON()" title="Eksportuj">📥</button>
</div>

<div id="win-settings" class="win" style="top:100px; left:100px;">
  <div class="win-head">
    <span>Ustawienia Systemu</span>
    <button onclick="toggleWin('win-settings')" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
  </div>
  <div class="win-body">
    <div class="settings-group">
      <span class="settings-label">Kolor Główny</span>
      <div class="color-picker">
        <input type="color" id="color-primary" onchange="updateTheme()" value="#7c3aed">
        <span id="label-primary">#7c3aed</span>
      </div>
    </div>
    <div class="settings-group">
      <span class="settings-label">Animacja Tła</span>
      <input type="range" min="0" max="100" value="50" oninput="updateBgSpeed(this.value)">
    </div>
  </div>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="exportImage()">Zapisz jako obraz (PNG)</button>
</div>

<script>
// ═══════════════════════════════════════════════════
// KONFIGURACJA I ZMIENNE
// ═══════════════════════════════════════════════════
let nodes = [
  { id: 'root', text: 'Mój Projekt', x: window.innerWidth/2 - 75, y: window.innerHeight/2 - 25, isRoot: true, color: '#7c3aed' }
];
let connections = [];
let zoom = 1;
let panX = 0;
let panY = 0;
let isDragging = false;
let dragTarget = null;
let lastMouseX, lastMouseY;

const viewport = document.getElementById('mm-viewport');
const nodesLayer = document.getElementById('mm-nodes-layer');
const svg = document.getElementById('mm-svg');
const nodeCtx = document.getElementById('node-ctx');
const nodeInput = document.getElementById('node-input');

let currentNodeId = null;
let ctxHideTimer = null; // KLUCZOWA POPRAWKA: Timer do obsługi okienka

// ═══════════════════════════════════════════════════
// MAPA MYŚLI - LOGIKA
// ═══════════════════════════════════════════════════

function init() {
  render();
  setupCanvas();
  window.addEventListener('resize', setupCanvas);
}

function render() {
  nodesLayer.innerHTML = '';
  svg.innerHTML = '';
  
  nodes.forEach(node => {
    const el = document.createElement('div');
    el.className = `mm-node ${node.isRoot ? 'root' : ''}`;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.style.borderColor = node.color || 'var(--border)';
    el.textContent = node.text;
    
    // Obsługa myszy dla węzła
    el.addEventListener('mousedown', (e) => startNodeDrag(e, node));
    
    // POPRAWKA: Obsługa najechania z timerem
    el.addEventListener('mouseenter', (e) => {
      clearTimeout(ctxHideTimer); // Jeśli wróciliśmy na węzeł, nie zamykaj
      showCtx(node, e);
    });
    
    el.addEventListener('mouseleave', () => {
      // Dajemy użytkownikowi 300ms na przesunięcie myszki do okienka
      ctxHideTimer = setTimeout(() => {
        hideCtx();
      }, 300);
    });

    nodesLayer.appendChild(el);
  });

  connections.forEach(conn => {
    const from = nodes.find(n => n.id === conn.from);
    const to = nodes.find(n => n.id === conn.to);
    if (from && to) drawLine(from, to);
  });

  updateViewport();
}

function showCtx(node, e) {
  currentNodeId = node.id;
  nodeInput.value = node.text;
  nodeCtx.style.display = 'block';
  
  // Pozycjonowanie okienka obok węzła
  const rect = e.target.getBoundingClientRect();
  nodeCtx.style.left = (rect.right + 10) + 'px';
  nodeCtx.style.top = rect.top + 'px';
}

function hideCtx() {
  nodeCtx.style.display = 'none';
  currentNodeId = null;
}

// POPRAWKA: Obsługa najechania na samo okienko
nodeCtx.addEventListener('mouseenter', () => {
  clearTimeout(ctxHideTimer); // Myszka jest nad okienkiem, zatrzymaj zamykanie
});

nodeCtx.addEventListener('mouseleave', () => {
  hideCtx(); // Myszka opuściła okienko, zamknij
});

function drawLine(n1, n2) {
  const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
  const x1 = n1.x + 75;
  const y1 = n1.y + 25;
  const x2 = n2.x + 75;
  const y2 = n2.y + 25;
  
  // Krzywa Beziera
  const dx = Math.abs(x1 - x2) * 0.5;
  const d = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
  
  line.setAttribute("d", d);
  line.setAttribute("class", "mm-line");
  line.setAttribute("stroke", n1.color || "#7c3aed");
  svg.appendChild(line);
}

function addChildNode() {
  if (!currentNodeId) return;
  const parent = nodes.find(n => n.id === currentNodeId);
  const newNode = {
    id: Date.now().toString(),
    text: 'Nowy wątek',
    x: parent.x + 200,
    y: parent.y + (Math.random() * 100 - 50),
    color: parent.color
  };
  nodes.push(newNode);
  connections.push({ from: parent.id, to: newNode.id });
  render();
}

function deleteNode() {
  if (!currentNodeId || currentNodeId === 'root') return;
  nodes = nodes.filter(n => n.id !== currentNodeId);
  connections = connections.filter(c => c.from !== currentNodeId && c.to !== currentNodeId);
  hideCtx();
  render();
}

nodeInput.addEventListener('input', (e) => {
  if (currentNodeId) {
    const node = nodes.find(n => n.id === currentNodeId);
    node.text = e.target.value;
    render();
  }
});

function setNodeColor(color) {
  if (currentNodeId) {
    const node = nodes.find(n => n.id === currentNodeId);
    node.color = color;
    render();
  }
}

// ═══════════════════════════════════════════════════
// NAWIGACJA (PAN & ZOOM)
// ═══════════════════════════════════════════════════

function updateViewport() {
  viewport.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
}

document.getElementById('mm-container').addEventListener('mousedown', e => {
  if (e.target.id === 'mm-container' || e.target.id === 'mm-viewport') {
    isDragging = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
  }
});

window.addEventListener('mousemove', e => {
  if (isDragging) {
    panX += e.clientX - lastMouseX;
    panY += e.clientY - lastMouseY;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    updateViewport();
  } else if (dragTarget) {
    dragTarget.x += (e.clientX - lastMouseX) / zoom;
    dragTarget.y += (e.clientY - lastMouseY) / zoom;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    render();
  }
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  dragTarget = null;
});

function startNodeDrag(e, node) {
  e.stopPropagation();
  dragTarget = node;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
}

function resetView() {
  panX = 0; panY = 0; zoom = 1;
  updateViewport();
}

// ═══════════════════════════════════════════════════
// BACKGROUND ANIMATION
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let bgSpeed = 0.5;

function setupCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = [];
  for(let i=0; i<50; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2,
      vx: (Math.random() - 0.5) * bgSpeed,
      vy: (Math.random() - 0.5) * bgSpeed
    });
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(124, 58, 237, 0.2)';
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if(p.x < 0) p.x = canvas.width;
    if(p.x > canvas.width) p.x = 0;
    if(p.y < 0) p.y = canvas.height;
    if(p.y > canvas.height) p.y = 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}

// ═══════════════════════════════════════════════════
// WINDOWS & UI
// ═══════════════════════════════════════════════════
function toggleWin(id) {
  const w = document.getElementById(id);
  w.style.display = w.style.display === 'flex' ? 'none' : 'flex';
}

function updateTheme() {
  const color = document.getElementById('color-primary').value;
  document.documentElement.style.setProperty('--primary', color);
  document.getElementById('label-primary').textContent = color;
}

function exportImage() {
  html2canvas(document.getElementById('mm-container'), {
    backgroundColor: '#0a0a0f'
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'studyos-mindmap.png';
    link.href = canvas.toDataURL();
    link.click();
  });
}

// Init system
init();
animate();

</script>
</body>
</html>
