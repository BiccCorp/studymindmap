<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyOS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --primary: #7c3aed;
  --secondary: #06b6d4;
  --accent: #f59e0b;
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.1);
  --text: #f0f0f5;
  --text-muted: rgba(240,240,245,0.45);
  --font-main: 'Space Grotesk', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.6);
  --blob-speed: 1;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  overflow: hidden;
  user-select: none;
}

/* ── CANVAS BG ── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── VIEWS ── */
#app { position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column; }

.view {
  flex: 1; display: none; flex-direction: column;
  opacity: 0; transform: translateY(12px);
  transition: opacity .3s ease, transform .3s ease;
  overflow: hidden;
}
.view.active { display: flex; }
.view.visible { opacity: 1; transform: translateY(0); }

/* ── MINDMAP VIEW ── */
#view-mindmap { position: relative; }

#mm-toolbar {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  display: flex; gap: 8px;
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(16px);
  border: 1px solid var(--glass-border);
  border-radius: 40px;
  padding: 8px 14px;
  box-shadow: var(--shadow);
}

#mm-toolbar button {
  background: none; border: none; color: var(--text-muted);
  font-size: 13px; font-family: var(--font-main);
  padding: 5px 12px; border-radius: 20px; cursor: pointer;
  transition: all .2s; white-space: nowrap;
}
#mm-toolbar button:hover { background: var(--surface-hover); color: var(--text); }
#mm-toolbar button.active { background: var(--primary); color: #fff; }

#mm-viewport {
  position: absolute; inset: 0;
  overflow: hidden; cursor: grab;
}
#mm-viewport.grabbing { cursor: grabbing; }

#mm-world {
  position: absolute; top: 0; left: 0;
  width: 4000px; height: 4000px;
  transform-origin: 0 0;
}

svg#mm-links {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none; overflow: visible;
}

svg#mm-links line {
  stroke: var(--primary);
  stroke-width: 2;
  stroke-opacity: 0.5;
  stroke-dasharray: 5 3;
}

.mm-node {
  position: absolute;
  min-width: 110px; max-width: 220px;
  padding: 10px 16px;
  border-radius: var(--radius);
  border: 1.5px solid var(--glass-border);
  background: rgba(20,20,30,0.88);
  backdrop-filter: blur(10px);
  color: var(--text);
  font-size: 13px; font-weight: 500;
  cursor: grab;
  text-align: center;
  word-break: break-word;
  transition: border-color .2s, box-shadow .2s, filter .3s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  z-index: 10;
}
.mm-node:hover { border-color: var(--primary); z-index: 20; }
.mm-node.drag-over { border-color: var(--secondary); box-shadow: 0 0 0 2px var(--secondary); }
.mm-node.flashcard-blur { filter: blur(6px); }

/* ── NODE HOVER MENU ── */
#node-hover-menu {
  position: fixed;
  z-index: 9999;
  background: rgba(12,12,18,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow-lg);
  display: none;
  flex-direction: column;
  gap: 10px;
  min-width: 200px;
}
#node-hover-menu.visible { display: flex; }

.color-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
}
.color-swatch {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1.5px solid transparent; cursor: pointer;
  transition: transform .15s, border-color .15s;
}
.color-swatch:hover { transform: scale(1.15); border-color: #fff; }

.menu-btn {
  background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.2);
  color: #ff6060; font-family: var(--font-main);
  font-size: 12px; padding: 6px 10px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: background .2s;
}
.menu-btn:hover { background: rgba(255,80,80,0.2); }

/* ── SETTINGS VIEW ── */
#view-settings {
  padding: 60px 40px 100px;
  overflow-y: auto;
  align-items: center;
}

.settings-card {
  width: 100%; max-width: 560px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 28px 32px;
  margin-bottom: 20px;
}
.settings-card h2 {
  font-size: 15px; font-weight: 600;
  color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 20px;
}

.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 16px;
}
.setting-row:last-child { border-bottom: none; }
.setting-row label { font-size: 14px; color: var(--text); flex: 1; }

.setting-row input[type="color"] {
  width: 40px; height: 32px;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  background: none; cursor: pointer; padding: 2px;
}
.setting-row select, .setting-row input[type="range"] {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font-main);
  padding: 6px 10px; font-size: 13px; cursor: pointer;
}
.setting-row input[type="range"] { padding: 0; width: 120px; accent-color: var(--primary); }

.btn-danger {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.25);
  color: #f87171; font-family: var(--font-main);
  font-size: 13px; font-weight: 500;
  padding: 10px 20px; border-radius: var(--radius-sm);
  cursor: pointer; transition: all .2s; margin-top: 8px;
}
.btn-danger:hover { background: rgba(239,68,68,0.22); }

/* ── DOCK ── */
#dock {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  z-index: 200;
  display: flex; gap: 6px;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 8px 10px;
  box-shadow: var(--shadow-lg);
}

.dock-btn {
  width: 46px; height: 46px;
  border: none; border-radius: 50%;
  background: none; cursor: pointer;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, transform .15s;
  position: relative;
}
.dock-btn:hover { background: var(--surface-hover); transform: scale(1.1); }
.dock-btn.active { background: var(--primary); }

/* ── TOOLS DRAWER ── */
#tools-drawer {
  position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(12px);
  z-index: 190;
  display: flex; gap: 8px;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 40px;
  padding: 8px 12px;
  box-shadow: var(--shadow);
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
}
#tools-drawer.open { opacity: 1; pointer-events: all; transform: translateX(-50%) translateY(0); }

.tool-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 13px;
  font-family: var(--font-main); font-weight: 500;
  padding: 6px 14px; border-radius: 20px;
  transition: all .2s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.tool-btn:hover { background: var(--surface-hover); color: var(--text); }
.tool-btn.active { background: var(--primary); color: #fff; }

/* ── FLOATING WINDOWS ── */
.float-win {
  position: fixed;
  background: rgba(10,10,18,0.9);
  backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  display: none;
  flex-direction: column;
  z-index: 300;
  min-width: 260px;
  overflow: hidden;
}
.float-win.visible { display: flex; }

.win-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-bottom: 1px solid var(--glass-border);
  cursor: move;
  gap: 8px;
}
.win-header span { font-size: 13px; font-weight: 600; flex: 1; }
.win-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 16px; cursor: pointer; line-height: 1;
  transition: color .2s; padding: 2px 6px; border-radius: 4px;
}
.win-close:hover { color: #ff6060; background: rgba(255,96,96,0.1); }

.win-body { padding: 16px; display: flex; flex-direction: column; gap: 12px; }

/* ── POMODORO ── */
#win-pomodoro { width: 260px; }
.pomo-display {
  text-align: center; padding: 20px 0 8px;
}
.pomo-time {
  font-size: 48px; font-weight: 700; letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.pomo-phase { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.pomo-cycle { font-size: 11px; color: var(--text-muted); }
.pomo-controls { display: flex; gap: 8px; }
.pomo-btn {
  flex: 1; padding: 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--glass-border);
  background: var(--surface); color: var(--text);
  font-family: var(--font-main); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.pomo-btn:hover { background: var(--primary); border-color: var(--primary); }
.pomo-settings { display: flex; gap: 8px; }
.pomo-input-group { flex: 1; }
.pomo-input-group label { font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 4px; }
.pomo-input-group input {
  width: 100%; background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font-main); font-size: 13px;
  padding: 6px 8px; text-align: center;
}

/* ── RADIO ── */
#win-radio { width: 300px; }
.radio-url {
  display: flex; gap: 6px;
}
.radio-url input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font-main); font-size: 12px; padding: 8px 10px;
}
.radio-url input::placeholder { color: var(--text-muted); }
.radio-play {
  padding: 8px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--primary); background: rgba(124,58,237,0.15);
  color: var(--primary); font-family: var(--font-main); font-size: 13px;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.radio-play:hover { background: var(--primary); color: #fff; }
.radio-status { font-size: 11px; color: var(--text-muted); min-height: 14px; }
.radio-vol { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
.radio-vol input { flex: 1; accent-color: var(--secondary); }

/* ── NOTEPAD ── */
#win-notepad { width: 320px; }
#notepad-area {
  width: 100%; height: 220px; resize: none;
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: 'JetBrains Mono', monospace;
  font-size: 13px; line-height: 1.6; padding: 10px 12px;
  outline: none;
}
#notepad-area:focus { border-color: var(--primary); }

/* ── CHECKLIST ── */
#win-checklist { width: 300px; }
.check-add { display: flex; gap: 6px; }
.check-add input {
  flex: 1; background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: var(--font-main); font-size: 13px; padding: 7px 10px;
}
.check-add input::placeholder { color: var(--text-muted); }
.check-add button {
  padding: 7px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--primary); background: rgba(124,58,237,0.15);
  color: var(--primary); font-size: 16px; cursor: pointer; transition: all .2s;
}
.check-add button:hover { background: var(--primary); color: #fff; }
.check-list { display: flex; flex-direction: column; gap: 4px; max-height: 240px; overflow-y: auto; }
.check-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--radius-sm);
  background: var(--surface);
  transition: background .15s;
}
.check-item:hover { background: var(--surface-hover); }
.check-item input[type="checkbox"] { accent-color: var(--primary); cursor: pointer; }
.check-item span { flex: 1; font-size: 13px; transition: all .2s; }
.check-item.done span { text-decoration: line-through; color: var(--text-muted); }
.check-item .del-btn {
  background: none; border: none; color: var(--text-muted);
  font-size: 14px; cursor: pointer; padding: 2px 4px; border-radius: 3px;
  transition: color .2s;
}
.check-item .del-btn:hover { color: #ff6060; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.22); }

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.toast {
  position: fixed; top: 20px; right: 20px; z-index: 9999;
  background: rgba(20,20,30,0.95);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 10px 16px; font-size: 13px;
  box-shadow: var(--shadow);
  animation: fadeIn .3s ease;
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">
  <!-- MINDMAP VIEW -->
  <div id="view-mindmap" class="view active">
    <div id="mm-toolbar">
      <button id="btn-add-node">＋ Węzeł</button>
      <button id="btn-flashcard">🃏 Fiszki</button>
      <button id="btn-export-json">⬇ JSON</button>
      <button id="btn-import-json">⬆ JSON</button>
      <button id="btn-export-png">📷 PNG</button>
    </div>
    <div id="mm-viewport">
      <div id="mm-world">
        <svg id="mm-links"></svg>
      </div>
    </div>
    <input type="file" id="import-file-input" accept=".json" style="display:none">
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="view">
    <div class="settings-card">
      <h2>🎨 Motyw</h2>
      <div class="setting-row">
        <label>Kolor główny</label>
        <input type="color" id="set-primary" value="#7c3aed">
      </div>
      <div class="setting-row">
        <label>Kolor akcentu</label>
        <input type="color" id="set-secondary" value="#06b6d4">
      </div>
      <div class="setting-row">
        <label>Czcionka</label>
        <select id="set-font">
          <option value="'Space Grotesk', sans-serif">Space Grotesk</option>
          <option value="'DM Serif Display', serif">DM Serif Display</option>
          <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
        </select>
      </div>
    </div>
    <div class="settings-card">
      <h2>✨ Wizualizacja</h2>
      <div class="setting-row">
        <label>Prędkość blobów</label>
        <input type="range" id="set-blob-speed" min="0.1" max="3" step="0.1" value="1">
      </div>
    </div>
    <div class="settings-card">
      <h2>⚠️ Dane</h2>
      <button class="btn-danger" id="btn-reset">🗑️ Wyczyść wszystkie dane i przeładuj</button>
    </div>
  </div>
</div>

<!-- DOCK -->
<div id="dock">
  <button class="dock-btn active" id="dock-mindmap" title="Mapa Myśli">🧠</button>
  <button class="dock-btn" id="dock-tools" title="Narzędzia">🛠️</button>
  <button class="dock-btn" id="dock-settings" title="Ustawienia">⚙️</button>
</div>

<!-- TOOLS DRAWER -->
<div id="tools-drawer">
  <button class="tool-btn" data-win="pomodoro">⏱ Pomodoro</button>
  <button class="tool-btn" data-win="radio">📻 Radio</button>
  <button class="tool-btn" data-win="notepad">📝 Notatnik</button>
  <button class="tool-btn" data-win="checklist">✅ Checklista</button>
</div>

<!-- POMODORO WINDOW -->
<div class="float-win" id="win-pomodoro" data-win-id="pomodoro">
  <div class="win-header">
    <span>⏱ Pomodoro</span>
    <button class="win-close" data-win="pomodoro">✕</button>
  </div>
  <div class="win-body">
    <div class="pomo-display">
      <div class="pomo-time" id="pomo-time">25:00</div>
      <div class="pomo-phase" id="pomo-phase">Czas pracy</div>
      <div class="pomo-cycle" id="pomo-cycle">Cykl 1</div>
    </div>
    <div class="pomo-controls">
      <button class="pomo-btn" id="pomo-start">▶ Start</button>
      <button class="pomo-btn" id="pomo-pause">⏸ Pauza</button>
      <button class="pomo-btn" id="pomo-reset">↺ Reset</button>
    </div>
    <div class="pomo-settings">
      <div class="pomo-input-group">
        <label>Praca (min)</label>
        <input type="number" id="pomo-work-min" value="25" min="1" max="90">
      </div>
      <div class="pomo-input-group">
        <label>Przerwa (min)</label>
        <input type="number" id="pomo-break-min" value="5" min="1" max="30">
      </div>
    </div>
  </div>
</div>

<!-- RADIO WINDOW -->
<div class="float-win" id="win-radio" data-win-id="radio">
  <div class="win-header">
    <span>📻 Radio</span>
    <button class="win-close" data-win="radio">✕</button>
  </div>
  <div class="win-body">
    <div class="radio-url">
      <input type="text" id="radio-url-input" placeholder="URL streamu (mp3/aac)...">
      <button class="radio-play" id="radio-play-btn">▶</button>
    </div>
    <div class="radio-status" id="radio-status">Wstrzymane</div>
    <div class="radio-vol">
      <span>🔈</span>
      <input type="range" id="radio-vol" min="0" max="1" step="0.01" value="0.7">
      <span>🔊</span>
    </div>
  </div>
</div>

<!-- NOTEPAD WINDOW -->
<div class="float-win" id="win-notepad" data-win-id="notepad">
  <div class="win-header">
    <span>📝 Notatnik</span>
    <button class="win-close" data-win="notepad">✕</button>
  </div>
  <div class="win-body">
    <textarea id="notepad-area" placeholder="Pisz tutaj..."></textarea>
  </div>
</div>

<!-- CHECKLIST WINDOW -->
<div class="float-win" id="win-checklist" data-win-id="checklist">
  <div class="win-header">
    <span>✅ Checklista</span>
    <button class="win-close" data-win="checklist">✕</button>
  </div>
  <div class="win-body">
    <div class="check-add">
      <input type="text" id="check-input" placeholder="Nowe zadanie...">
      <button id="check-add-btn">+</button>
    </div>
    <div class="check-list" id="check-list"></div>
  </div>
</div>

<!-- NODE HOVER MENU -->
<div id="node-hover-menu">
  <div class="color-grid" id="node-color-grid"></div>
  <button class="menu-btn" id="node-unlink-btn">🗑️ Usuń wszystkie połączenia</button>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════
const STORE_KEY = 'studyos_v2';
let saveTimer = null;

const defaultState = () => ({
  view: 'mindmap',
  nodes: [{ id: 'n1', x: 1950, y: 1950, text: 'Moja Mapa', color: '#1e1b4b' }],
  links: [],
  zoom: 1, pan: { x: 0, y: 0 },
  windows: {
    pomodoro: { visible: false, x: 40, y: 120 },
    radio: { visible: false, x: 320, y: 120 },
    notepad: { visible: false, x: 40, y: 400 },
    checklist: { visible: false, x: 360, y: 400 }
  },
  notes: '',
  checklist: [],
  pomodoro: { workMin: 25, breakMin: 5 },
  radioUrl: '',
  settings: {
    primary: '#7c3aed',
    secondary: '#06b6d4',
    font: "'Space Grotesk', sans-serif",
    blobSpeed: 1
  }
});

let state;
try {
  const saved = localStorage.getItem(STORE_KEY);
  if (saved) {
    const parsed = JSON.parse(saved);
    state = { ...defaultState(), ...parsed };
    state.settings = { ...defaultState().settings, ...(parsed.settings || {}) };
    state.windows = { ...defaultState().windows, ...(parsed.windows || {}) };
    state.pomodoro = { ...defaultState().pomodoro, ...(parsed.pomodoro || {}) };
  } else {
    state = defaultState();
  }
} catch(e) { state = defaultState(); }

function schedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(e) {}
  }, 250);
}

// ═══════════════════════════════════════════════════
// CANVAS BACKGROUND - BLOBS
// ═══════════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let blobs = [];

function initBlobs() {
  const W = window.innerWidth, H = window.innerHeight;
  bgCanvas.width = W; bgCanvas.height = H;
  blobs = Array.from({ length: 10 }, (_, i) => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.5,
    vy: (Math.random() - 0.5) * 0.5,
    r: 180 + Math.random() * 200,
    hue: [260, 200, 170, 30, 320][i % 5],
    alpha: 0.06 + Math.random() * 0.06
  }));
}

function animateBlobs() {
  const W = bgCanvas.width, H = bgCanvas.height;
  const spd = parseFloat(state.settings.blobSpeed) || 1;
  bgCtx.clearRect(0, 0, W, H);
  bgCtx.fillStyle = '#0a0a0f';
  bgCtx.fillRect(0, 0, W, H);

  for (const b of blobs) {
    b.x += b.vx * spd;
    b.y += b.vy * spd;
    if (b.x < -b.r) b.x = W + b.r;
    if (b.x > W + b.r) b.x = -b.r;
    if (b.y < -b.r) b.y = H + b.r;
    if (b.y > H + b.r) b.y = -b.r;

    const g = bgCtx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
    g.addColorStop(0, `hsla(${b.hue}, 70%, 55%, ${b.alpha})`);
    g.addColorStop(1, `hsla(${b.hue}, 70%, 55%, 0)`);
    bgCtx.beginPath();
    bgCtx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    bgCtx.fillStyle = g;
    bgCtx.fill();
  }
  requestAnimationFrame(animateBlobs);
}

window.addEventListener('resize', () => { initBlobs(); });
initBlobs();
animateBlobs();

// POMODORO
// ═══════════════════════════════════════════════════
let pomoState = {
  running: false, isBreak: false, cycle: 1,
  endTime: null, remaining: null
};
let pomoInterval = null;

const pomoTimeEl = document.getElementById('pomo-time');
const pomoPhaseEl = document.getElementById('pomo-phase');
const pomoCycleEl = document.getElementById('pomo-cycle');
const pomoWorkIn = document.getElementById('pomo-work-min');
const pomoBreakIn = document.getElementById('pomo-break-min');

pomoWorkIn.value = state.pomodoro.workMin;
pomoBreakIn.value = state.pomodoro.breakMin;

function formatTime(secs) {
  const m = Math.floor(secs / 60).toString().padStart(2, '0');
  const s = (secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function pomoReset() {
  clearInterval(pomoInterval);
  pomoInterval = null;
  pomoState.running = false;
  pomoState.isBreak = false;
  pomoState.cycle = 1;
  pomoState.endTime = null;
  const secs = (parseInt(pomoWorkIn.value) || 25) * 60;
  pomoState.remaining = secs;
  pomoTimeEl.textContent = formatTime(secs);
  pomoPhaseEl.textContent = 'Czas pracy';
  pomoCycleEl.textContent = 'Cykl 1';
}

function pomoTick() {
  const now = Date.now();
  const rem = Math.max(0, Math.round((pomoState.endTime - now) / 1000));
  pomoState.remaining = rem;
  pomoTimeEl.textContent = formatTime(rem);
  if (rem <= 0) {
    clearInterval(pomoInterval);
    pomoInterval = null;
    pomoState.running = false;
    pomoState.isBreak = !pomoState.isBreak;
    if (!pomoState.isBreak) pomoState.cycle++;
    const dur = pomoState.isBreak ? (parseInt(pomoBreakIn.value) || 5) : (parseInt(pomoWorkIn.value) || 25);
    const label = pomoState.isBreak ? '☕ Przerwa' : '💪 Czas pracy';
    pomoPhaseEl.textContent = label;
    pomoCycleEl.textContent = `Cykl ${pomoState.cycle}`;
    pomoState.remaining = dur * 60;
    pomoTimeEl.textContent = formatTime(pomoState.remaining);
    try { new Notification('Pomodoro', { body: `${label} – ${dur} minut` }); } catch(e) {}
    alert(`${label}! Czas: ${dur} min`);
    pomoStart();
  }
}

function pomoStart() {
  if (pomoState.running) return;
  pomoState.running = true;
  const rem = pomoState.remaining || (parseInt(pomoWorkIn.value) || 25) * 60;
  pomoState.endTime = Date.now() + rem * 1000;
  pomoInterval = setInterval(pomoTick, 500);
  pomoPhaseEl.textContent = pomoState.isBreak ? '☕ Przerwa' : '💪 Czas pracy';
}

function pomoPause() {
  if (!pomoState.running) return;
  clearInterval(pomoInterval); pomoInterval = null;
  pomoState.running = false;
  pomoState.remaining = Math.max(0, Math.round((pomoState.endTime - Date.now()) / 1000));
}

document.getElementById('pomo-start').addEventListener('click', pomoStart);
document.getElementById('pomo-pause').addEventListener('click', pomoPause);
document.getElementById('pomo-reset').addEventListener('click', pomoReset);

[pomoWorkIn, pomoBreakIn].forEach(inp => {
  inp.addEventListener('change', () => {
    state.pomodoro.workMin = parseInt(pomoWorkIn.value) || 25;
    state.pomodoro.breakMin = parseInt(pomoBreakIn.value) || 5;
    if (!pomoState.running) pomoReset();
    schedSave();
  });
});

pomoReset();

// MINDMAP ENGINE
// ═══════════════════════════════════════════════════
const viewport = document.getElementById('mm-viewport');
const world = document.getElementById('mm-world');
const svgLinks = document.getElementById('mm-links');

let mmZoom = state.zoom || 1;
let mmPan = { ...((state.pan) || { x: 0, y: 0 }) };
let flashcardMode = false;
let nodeIdCounter = Date.now();

function applyTransform() {
  world.style.transform = `translate(${mmPan.x}px, ${mmPan.y}px) scale(${mmZoom})`;
}

function saveMapState() {
  state.zoom = mmZoom;
  state.pan = { ...mmPan };
  schedSave();
}

// Centering on first load
function centerMap() {
  if (state.nodes.length > 0) {
    const n = state.nodes[0];
    mmPan.x = window.innerWidth / 2 - n.x * mmZoom;
    mmPan.y = window.innerHeight / 2 - n.y * mmZoom;
  }
  applyTransform();
}

// ZOOM
viewport.addEventListener('wheel', (e) => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const newZoom = Math.min(2.5, Math.max(0.2, mmZoom * delta));
  mmPan.x = mx - (mx - mmPan.x) * (newZoom / mmZoom);
  mmPan.y = my - (my - mmPan.y) * (newZoom / mmZoom);
  mmZoom = newZoom;
  applyTransform(); saveMapState();
}, { passive: false });

// PAN
let isPanning = false, panStart = { x: 0, y: 0 }, panOrigin = { x: 0, y: 0 };

viewport.addEventListener('mousedown', (e) => {
  if (e.target !== viewport && e.target !== world && e.target !== svgLinks) return;
  isPanning = true;
  panStart = { x: e.clientX, y: e.clientY };
  panOrigin = { ...mmPan };
  viewport.classList.add('grabbing');
});

document.addEventListener('mousemove', (e) => {
  if (!isPanning) return;
  mmPan.x = panOrigin.x + (e.clientX - panStart.x);
  mmPan.y = panOrigin.y + (e.clientY - panStart.y);
  applyTransform();
});

document.addEventListener('mouseup', () => {
  if (isPanning) { isPanning = false; viewport.classList.remove('grabbing'); saveMapState(); }
});

// RENDER LINKS
function renderLinks() {
  svgLinks.innerHTML = '';
  (state.links || []).forEach(l => {
    const a = state.nodes.find(n => n.id === l.from);
    const b = state.nodes.find(n => n.id === l.to);
    if (!a || !b) return;
    const ax = a.x + 60, ay = a.y + 20;
    const bx = b.x + 60, by = b.y + 20;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', ax); line.setAttribute('y1', ay);
    line.setAttribute('x2', bx); line.setAttribute('y2', by);
    svgLinks.appendChild(line);
  });
}

// RENDER NODES
function renderMindmap() {
  // Remove existing node divs
  world.querySelectorAll('.mm-node').forEach(n => n.remove());
  renderLinks();

  state.nodes.forEach((node, idx) => {
    const el = document.createElement('div');
    el.className = 'mm-node';
    el.dataset.id = node.id;
    el.textContent = node.text;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    if (node.color) el.style.background = node.color;
    if (flashcardMode && idx > 0) el.classList.add('flashcard-blur');

    makeNodeDraggable(el, node);
    makeNodeConnectable(el, node);

    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      const t = prompt('Edytuj węzeł:', node.text);
      if (t !== null) { node.text = t; el.textContent = t; schedSave(); }
    });

    // Hover menu
    let hoverTimeout = null;
    el.addEventListener('mouseenter', (e) => {
      clearTimeout(hoverTimeout);
      showNodeMenu(e, node, el);
    });
    el.addEventListener('mouseleave', () => {
      hoverTimeout = setTimeout(() => hideNodeMenu(), 200);
    });

    if (flashcardMode && idx > 0) {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        el.classList.remove('flashcard-blur');
      });
    }

    world.appendChild(el);
  });
}

// ── NODE DRAGGING ──
function makeNodeDraggable(el, node) {
  let dragging = false, ox = 0, oy = 0;
  let lastDropTarget = null;

  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    e.stopPropagation();
    dragging = true;
    ox = (e.clientX - mmPan.x) / mmZoom - node.x;
    oy = (e.clientY - mmPan.y) / mmZoom - node.y;
    el.style.zIndex = 30;
    hideNodeMenu();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const nx = (e.clientX - mmPan.x) / mmZoom - ox;
    const ny = (e.clientY - mmPan.y) / mmZoom - oy;
    node.x = nx; node.y = ny;
    el.style.left = nx + 'px';
    el.style.top = ny + 'px';
    renderLinks();

    // Highlight potential link target
    const mx = (e.clientX - mmPan.x) / mmZoom;
    const my = (e.clientY - mmPan.y) / mmZoom;
    if (lastDropTarget) { lastDropTarget.classList.remove('drag-over'); lastDropTarget = null; }
    world.querySelectorAll('.mm-node').forEach(other => {
      if (other === el) return;
      const oNode = state.nodes.find(n => n.id === other.dataset.id);
      if (!oNode) return;
      const dx = mx - (oNode.x + 60), dy = my - (oNode.y + 20);
      if (Math.sqrt(dx*dx + dy*dy) < 60) {
        other.classList.add('drag-over');
        lastDropTarget = other;
      }
    });
  });

  document.addEventListener('mouseup', (e) => {
    if (!dragging) return;
    dragging = false;
    el.style.zIndex = 10;
    if (lastDropTarget) {
      lastDropTarget.classList.remove('drag-over');
      const targetId = lastDropTarget.dataset.id;
      const alreadyLinked = state.links.some(l =>
        (l.from === node.id && l.to === targetId) || (l.from === targetId && l.to === node.id)
      );
      if (!alreadyLinked && targetId !== node.id) {
        state.links.push({ from: node.id, to: targetId });
        renderLinks();
      }
      lastDropTarget = null;
    }
    schedSave();
  });
}

function makeNodeConnectable(el, node) {}

      if (data.links) state.links = data.links;
      renderMindmap(); schedSave();
      showToast('Zaimportowano mapę!');
    } catch(err) { showToast('Błąd importu pliku JSON'); }
  };
  reader.readAsText(f);
  importFileInput.value = '';
});

// ── EXPORT PNG ──
document.getElementById('btn-export-png').addEventListener('click', async () => {
  const savedZoom = mmZoom, savedPan = { ...mmPan };
  mmZoom = 1; mmPan = { x: 0, y: 0 };
  applyTransform();
  await new Promise(r => setTimeout(r, 300));
  try {
    const canvas = await html2canvas(world, {
      backgroundColor: '#0a0a0f',
      scale: 1,
      useCORS: true,
      allowTaint: true
    });
    const a = document.createElement('a');
    a.download = 'mapa-mysli.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) { showToast('Błąd eksportu PNG'); }
  mmZoom = savedZoom; mmPan = savedPan;
  applyTransform();
});

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
const root = document.documentElement;

function applySettings() {
  const s = state.settings;
  root.style.setProperty('--primary', s.primary);
  root.style.setProperty('--secondary', s.secondary);
  root.style.setProperty('--font-main', s.font);
  root.style.setProperty('--blob-speed', s.blobSpeed);
  document.getElementById('set-primary').value = s.primary;
  document.getElementById('set-secondary').value = s.secondary;
  document.getElementById('set-font').value = s.font;
  document.getElementById('set-blob-speed').value = s.blobSpeed;
}

document.getElementById('set-primary').addEventListener('input', (e) => {
  state.settings.primary = e.target.value;
  root.style.setProperty('--primary', e.target.value);
  schedSave();
});
document.getElementById('set-secondary').addEventListener('input', (e) => {
  state.settings.secondary = e.target.value;
  root.style.setProperty('--secondary', e.target.value);
  schedSave();
});
document.getElementById('set-font').addEventListener('change', (e) => {
  state.settings.font = e.target.value;
  root.style.setProperty('--font-main', e.target.value);
  schedSave();
});
document.getElementById('set-blob-speed').addEventListener('input', (e) => {
  state.settings.blobSpeed = parseFloat(e.target.value);
  root.style.setProperty('--blob-speed', e.target.value);
  schedSave();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Na pewno wyczyścić wszystkie dane?')) {
    try { localStorage.removeItem(STORE_KEY); } catch(e) {}
    location.reload();
  }
});

applySettings();

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
function showToast(msg, duration = 2500) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, duration);
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
function init() {
  const h = location.hash.replace('#', '') || state.view || 'mindmap';
  switchView(views[h] ? h : 'mindmap');
  renderMindmap();
  if (!state.pan || (state.pan.x === 0 && state.pan.y === 0)) centerMap();
  else { applyTransform(); }
}

init();
</script>
